    .h-app { height: var(--tg-viewport-height, 100svh); }

<body class="h-app nexus-body">

<script type="text/babel">
const { useState, useEffect, useLayoutEffect, useRef, useCallback, useMemo } = React;

// ── Telegram WebApp 初始化 ────────────────────────────────────────────────────
const tgApp = window.Telegram?.WebApp;
// 判斷是否在 Telegram WebView 裡（即使 initData 暫時為空也算）
const isTMA = !!(tgApp);
const initData = isTMA ? (tgApp.initData || '') : '';
// 有 initData 才走 TG 驗證，否則 fallback 到密碼驗證
const isTelegram = isTMA && initData !== '';

if (isTMA) {
  tgApp.ready();
  tgApp.expand();
  tgApp.disableVerticalSwipes?.();
  const updateContentSafeArea = () => {
    const top = tgApp.contentSafeAreaInset?.top ?? 0;
    document.documentElement.style.setProperty('--tg-content-safe-top', `${top}px`);
  };
  updateContentSafeArea();
  tgApp.onEvent('contentSafeAreaChanged', updateContentSafeArea);
}

/** Web 登入 session token（localStorage；後端仍驗證於伺服器端 store） */
const WEB_SESSION_STORAGE_KEY = 'cc_web_session_token';

/** 桌面版側欄寬度（localStorage，px；與原 max-w-[48vw] 上限一致） */
const SIDEBAR_WIDTH_STORAGE_KEY = 'cc_sidebar_width_px';
const SIDEBAR_WIDTH_DEFAULT = 440;
const SIDEBAR_WIDTH_MIN = 260;

function readStoredSidebarWidthPx() {
  try {
    const raw = localStorage.getItem(SIDEBAR_WIDTH_STORAGE_KEY);
    const n = parseInt(raw, 10);
    if (Number.isFinite(n) && n > 0) return n;
  } catch (_) {}
  return SIDEBAR_WIDTH_DEFAULT;
}

/** Session 列表「依工作目錄分組」開關（localStorage） */
const SESSION_LIST_GROUP_BY_DIR_KEY = 'cc_session_list_group_by_dir';

function readStoredGroupByDir() {
  try {
    const raw = localStorage.getItem(SESSION_LIST_GROUP_BY_DIR_KEY);
    if (raw === '1' || raw === 'true') return true;
    if (raw === '0' || raw === 'false') return false;
  } catch (_) {}
  return false;
}

function clampSidebarWidthPx(w) {
  const max = Math.max(SIDEBAR_WIDTH_MIN, Math.floor(window.innerWidth * 0.48));
  return Math.min(Math.max(Math.round(w), SIDEBAR_WIDTH_MIN), max);
}

function sidebarWidthMaxPx() {
  return Math.max(SIDEBAR_WIDTH_MIN, Math.floor(window.innerWidth * 0.48));
}

/**
 * 正規化 API base path：無結尾 /；根為 ''；一律以 / 開頭（非空時）。
 */
function normalizeApiBasePath(raw) {
  if (raw == null) return null;
  let b = String(raw).trim();
  if (b === '' || b === '/') return '';
  b = b.replace(/\/+$/, '');
  if (!b.startsWith('/')) b = `/${b}`;
  return b;
}

/**
 * 可選覆寫：反代若無法由網址自動對齊 API 節點時使用。
 * - <meta name="cc-api-base" content="/myapp">（需在 bundle 執行前存在於 DOM）
 * - 或於任何 script 以前：window.__CC_API_BASE__ = '/myapp'
 */
function readApiBaseOverride() {
  try {
    const el = document.querySelector('meta[name="cc-api-base"]');
    if (el) {
      const c = el.getAttribute('content');
      if (c != null && String(c).trim() !== '') {
        return normalizeApiBasePath(c);
      }
    }
  } catch (_) {}
  if (typeof window.__CC_API_BASE__ === 'string' && window.__CC_API_BASE__.trim() !== '') {
    return normalizeApiBasePath(window.__CC_API_BASE__);
  }
  return null;
}

/**
 * 與主站 internal/static/index.html 完全相同：pathname 推導 + Nexus／Focus 目錄剝除。
 */
function inferApiBaseFromPathname() {
  let p = window.location.pathname || '/';
  if (/\/[^/]+\.html$/i.test(p)) {
    p = p.replace(/\/[^/]+\.html$/i, '');
  }
  p = p.replace(/\/+$/, '');
  p = p.replace(/\/nexus$/i, '').replace(/\/focus$/i, '');
  p = p.replace(/\/+$/, '');
  if (p === '' || p === '/') return '';
  return p;
}

function getSpaBasePath() {
  const over = readApiBaseOverride();
  if (over !== null) return over;
  return inferApiBaseFromPathname();
}

/** API 路徑（必須以 / 開頭）加上 base，供反代剝離前綴時瀏覽器仍打對外完整路徑。 */
function appPath(path) {
  const rel = path.startsWith('/') ? path : `/${path}`;
  const base = getSpaBasePath();
  if (!base) return rel;
  return `${base}${rel}`;
}

function resolveApiUrl(url) {
  if (/^https?:\/\//i.test(url)) return url;
  if (url.startsWith('/')) return appPath(url);
  return url;
}

console.log(
  '[nexus init] isTMA:', isTMA,
  'isTelegram:', isTelegram,
  'initData len:', initData.length,
  'protocol:', location.protocol,
  'spaBase:', getSpaBasePath() || '(root)',
);

// 統一 fetch：TMA 帶 initData；Web 帶 Bearer（localStorage），舊版仍相容後端 Cookie
const apiFetch = (url, opts = {}) => {
  const headers = { ...(opts.headers || {}) };
  if (isTelegram) {
    headers['X-Telegram-Init-Data'] = initData;
  } else {
    try {
      const t = localStorage.getItem(WEB_SESSION_STORAGE_KEY);
      if (t) headers['Authorization'] = `Bearer ${t}`;
    } catch (_) {}
  }
  return fetch(resolveApiUrl(url), { ...opts, headers });
};

// WebSocket：同源 ws/wss；TMA 用 query initData；Web 用 query token（瀏覽器無法自訂 WS Header）
const wsURL = (sessionId) => {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  let url = `${proto}://${location.host}${appPath(`/sessions/${sessionId}/ws`)}`;
  const sep = (u) => (u.includes('?') ? '&' : '?');
  if (isTelegram) {
    return `${url}${sep(url)}initData=${encodeURIComponent(initData)}`;
  }
  try {
    const t = localStorage.getItem(WEB_SESSION_STORAGE_KEY);
    if (t) return `${url}${sep(url)}token=${encodeURIComponent(t)}`;
  } catch (_) {}
  return url;
};

marked.setOptions({
  highlight: (code, lang) => {
    if (lang && hljs.getLanguage(lang)) return hljs.highlight(code, { language: lang }).value;
    return hljs.highlightAuto(code).value;
  },
  breaks: true,
});

const parseMarkdown = (text) => {
  const html = marked.parse(text);
  return html
    .replace(/<table>/g, '<div class="table-wrap"><table>')
    .replace(/<\/table>/g, '</table></div>');
};

/** 顯示用：permission_mode 值 → 中文標籤。包含 Claude/Cursor 與 Gemini 兩套值。 */
const PERM_MODE_LABEL = {
  default: '預設',
  acceptEdits: '自動編輯',
  bypassPermissions: '⚠️ 跳過授權',
  auto_edit: '自動編輯',
  yolo: '⚠️ YOLO（全自動）',
  plan: '規劃模式',
};

const AGENT_LABEL = { claude: 'Claude', cursor: 'Cursor', codex: 'Codex', gemini: 'Gemini' };

/** 聊天室頂欄狀態角標：中文短標（避免與權限列搶注意力） */
const SESSION_STATE_LABEL = {
  IDLE: '待命',
  THINKING: '思考中',
  STREAMING: '輸出中',
  AWAITING_CONFIRM: '待授權',
  AWAITING_SHELL_CONFIRM: '待確認 Shell',
  SHELL_EXEC: 'Shell 執行中',
};

const INPUT_MODE_STORAGE_PREFIX = 'cc_input_mode:';
const INPUT_MODE_LEGACY_KEY = 'cc_input_mode';

/** 輸入框 `/` 觸發之 slash 命令清單（可選 `modes` 限定 inputMode，省略則全部顯示） */
const SLASH_COMMANDS = [
  {
    command: '/reset',
    description: '清除對話 context（等同 /clear）',
  },
  {
    command: '/clear',
    description: '清除對話 context（等同 /reset）',
  },
];

function inputModeStorageKey(sessionId) {
  return INPUT_MODE_STORAGE_PREFIX + String(sessionId || '');
}

function readInputModeForSession(sessionId) {
  try {
    const v = localStorage.getItem(inputModeStorageKey(sessionId));
    if (v === 'shell' || v === 'agent') return v;
    const legacy = localStorage.getItem(INPUT_MODE_LEGACY_KEY);
    if (legacy === 'shell' || legacy === 'agent') return legacy;
  } catch (_) {}
  return 'agent';
}

/**
 * 依 agent_type 回傳可用的 permission_mode 下拉選項。
 * - Claude / Cursor: default / acceptEdits / bypassPermissions
 * - Gemini: default / auto_edit / plan / yolo（對應 CLI --approval-mode）
 * - Codex: 暫不支援
 * 所有值共用 DB 欄位 `permission_mode`，後端各 runner 自行解釋。
 */
function permModeOptionsFor(agentType) {
  const t = String(agentType || 'claude').toLowerCase();
  if (t === 'gemini') {
    return [
      { value: 'default', label: '預設' },
      { value: 'auto_edit', label: '自動編輯' },
      { value: 'plan', label: '規劃模式' },
      { value: 'yolo', label: 'YOLO（全自動）⚠️' },
    ];
  }
  return [
    { value: 'default', label: '預設' },
    { value: 'acceptEdits', label: '自動編輯' },
    { value: 'bypassPermissions', label: '跳過授權 ⚠️' },
  ];
}

/**
 * 建立 Session 時「自訂 CLI 引數」：每行一個 argv，trim 後略過空行。
 * 路徑含空格時請整段寫在同一行（勿用空格拆成多段）。
 */
function parseCliExtraArgs(text) {
  if (text == null || !String(text).trim()) return [];
  return String(text)
    .split(/\r?\n/)
    .map((line) => line.trim())
    .filter((line) => line.length > 0);
}

function extractModelFromCliArgs(parts) {
  if (!Array.isArray(parts)) return '';
  for (let i = 0; i < parts.length; i++) {
    if (parts[i] === '--model' || parts[i] === '-m') return String(parts[i + 1] || '').trim();
  }
  return '';
}

function cliArgsWithoutModel(parts) {
  if (!Array.isArray(parts)) return [];
  const out = [];
  for (let i = 0; i < parts.length; i++) {
    if (parts[i] === '--model' || parts[i] === '-m') {
      i++;
      continue;
    }
    out.push(parts[i]);
  }
  return out;
}

function mergeModelIntoCliExtraLines(cliText, modelVal) {
  const baseParts = parseCliExtraArgs(cliText);
  const stripped = [];
  for (let i = 0; i < baseParts.length; i++) {
    if (baseParts[i] === '--model' || baseParts[i] === '-m') {
      i++;
      continue;
    }
    stripped.push(baseParts[i]);
  }
  const m = String(modelVal || '').trim();
  if (m) {
    stripped.push('--model', m);
  }
  return stripped.join('\n');
}

function buildForwardUserPrompt(note, originalBody) {
  const n = String(note || '').trim();
  const o = String(originalBody || '').trim();
  if (!n) return o;
  return `${n}\n\n---\n（以下為規劃內容）\n\n${o}`;
}

function sendPromptViaEphemeralWS(sessionId, text) {
  return new Promise((resolve, reject) => {
    let settled = false;
    const settle = (fn) => {
      if (settled) return;
      settled = true;
      clearTimeout(timer);
      fn();
    };
    let opened = false;
    const ws = new WebSocket(wsURL(sessionId));
    const timer = setTimeout(() => {
      try {
        ws.close();
      } catch (_) {}
      settle(() => reject(new Error('連線逾時')));
    }, 20000);
    ws.onopen = () => {
      opened = true;
      try {
        ws.send(JSON.stringify({ type: 'input', data: text }));
      } catch (e) {
        settle(() => reject(e));
        try {
          ws.close();
        } catch (_) {}
        return;
      }
      setTimeout(() => {
        try {
          ws.close();
        } catch (_) {}
      }, 80);
    };
    ws.onerror = () => settle(() => reject(new Error('WebSocket 錯誤')));
    ws.onclose = () => {
      if (opened) settle(() => resolve());
      else settle(() => reject(new Error('無法連線')));
    };
  });
}

/** 切換 agent_type 時，若舊的 mode 在新 agent 下不合法，退回 default。 */
function normalizePermMode(agentType, mode) {
  const valid = permModeOptionsFor(agentType).map((o) => o.value);
  return valid.includes(mode) ? mode : 'default';
}

/**
 * 權限模式分段開關（多態切換，取代下拉選單）。
 * danger 值（跳過授權 / YOLO）選中時以琥珀色強調。
 */
function PermModeSwitch({ agentType, value, onChange, disabled, title }) {
  const opts = permModeOptionsFor(agentType);
  const t = String(agentType || 'claude').toLowerCase();
  const ariaLabel =
    title || (t === 'gemini' ? 'Gemini 核准模式' : '權限模式');
  return (
    <div
      role="radiogroup"
      aria-label={ariaLabel}
      className={`inline-flex max-w-full flex-wrap items-stretch gap-0.5 rounded-2xl border border-cyan-500/15 bg-slate-950/80 p-0.5 shadow-[inset_0_1px_0_rgba(34,211,238,0.06)] backdrop-blur-sm ${
        disabled ? 'pointer-events-none opacity-45' : ''
      }`}
    >
      {opts.map((opt) => {
        const active = value === opt.value;
        const danger = opt.value === 'bypassPermissions' || opt.value === 'yolo';
        return (
          <button
            key={opt.value}
            type="button"
            role="radio"
            aria-checked={active}
            disabled={disabled}
            onClick={() => onChange(opt.value)}
            className={[
              'min-h-[2rem] shrink-0 grow-0 px-2 sm:px-2.5 py-1.5 text-center text-[10px] sm:text-xs font-medium leading-tight rounded-xl transition-[color,background-color,box-shadow] duration-150 whitespace-nowrap',
              'focus:outline-none focus-visible:ring-2 focus-visible:ring-cyan-500/60 focus-visible:ring-offset-1 focus-visible:ring-offset-slate-950',
              active
                ? danger
                  ? 'bg-amber-950/95 text-amber-100 ring-1 ring-amber-500/55 shadow-sm'
                  : 'bg-gradient-to-br from-cyan-600 to-teal-600 text-white shadow-md shadow-cyan-950/50'
                : 'text-slate-400 hover:bg-white/[0.06] hover:text-slate-100 border border-transparent',
            ].join(' ')}
          >
            {opt.label}
          </button>
        );
      })}
    </div>
  );
}

/** 權限模式：窄螢幕（app 版）用下拉選單，與 PermModeSwitch 選項一致。danger 值會套用琥珀邊框（與分段按鈕語意一致）。 */
function PermModeSelect({ agentType, value, onChange, disabled, title, id, className }) {
  const opts = permModeOptionsFor(agentType);
  const t = String(agentType || 'claude').toLowerCase();
  const ariaLabel =
    title || (t === 'gemini' ? 'Gemini 核准模式' : '權限模式');
  const selectId = id || `perm-mode-select-${t}`;
  const danger = value === 'bypassPermissions' || value === 'yolo';
  const widthClass = className != null && String(className).trim() !== '' ? '' : 'w-full ';
  return (
    <select
      id={selectId}
      aria-label={ariaLabel}
      value={value}
      disabled={disabled}
      onChange={(e) => onChange(e.target.value)}
      className={[
        widthClass,
        'min-w-0 rounded-lg px-3 py-1.5 text-sm focus:outline-none disabled:opacity-45 transition-[color,background-color,border-color,box-shadow] duration-150',
        danger
          ? 'border border-amber-500/65 bg-amber-950/50 text-amber-50 shadow-sm shadow-amber-950/30 focus:border-amber-400 focus:ring-1 focus:ring-amber-500/30'
          : 'border border-cyan-500/20 bg-slate-900/90 text-slate-100 focus:border-cyan-500/50 focus:ring-1 focus:ring-cyan-500/25',
        className || '',
      ].join(' ').replace(/\s+/g, ' ').trim()}
    >
      {opts.map((opt) => (
        <option key={opt.value} value={opt.value}>{opt.label}</option>
      ))}
    </select>
  );
}

/** 解析 API 回傳的 last_active（SQLite datetime 字串）為毫秒時間戳 */
function sessionLastActiveMs(s) {
  if (!s || !s.last_active) return 0;
  const raw = String(s.last_active).trim();
  const t = Date.parse(raw.includes('T') ? raw : raw.replace(' ', 'T'));
  return Number.isNaN(t) ? 0 : t;
}

/** 目錄分組標頭：顯示路徑最後兩段，避免過長 */
function workDirGroupShortLabel(dirKey) {
  const unset = '（未設定工作目錄）';
  if (!dirKey || dirKey === unset) return unset;
  const p = String(dirKey).replace(/[/\\]+$/, '');
  const parts = p.split(/[/\\]/).filter(Boolean);
  if (parts.length === 0) return dirKey;
  if (parts.length === 1) return parts[0];
  return `${parts[parts.length - 2]}/${parts[parts.length - 1]}`;
}

/** 依工作目錄排序用：空白路徑置底，其餘依路徑 localeCompare（numeric）。 */
function cmpSessionWorkDir(a, b) {
  const da = String(a.work_dir != null ? String(a.work_dir).trim() : '').toLowerCase();
  const db = String(b.work_dir != null ? String(b.work_dir).trim() : '').toLowerCase();
  if (!da && db) return 1;
  if (da && !db) return -1;
  return da.localeCompare(db, undefined, { numeric: true, sensitivity: 'base' });
}

function sortSessionsByWorkDirThenName(sessions) {
  if (!Array.isArray(sessions)) return [];
  return [...sessions].sort((a, b) => {
    const wd = cmpSessionWorkDir(a, b);
    if (wd !== 0) return wd;
    return String(a.name || '').localeCompare(String(b.name || ''), 'zh-Hant');
  });
}

/** 將 API / sync 的訊息列轉成 ChatView 用的物件（含 pending 串流） */
function mapMessageRow(m) {
  const role = m.role;
  const status = m.status || 'done';
  const pending = status === 'pending';
  const content = m.content || '';
  return {
    id: m.id,
    role,
    content,
    resultText: m.result_text || '',
    status,
    html: role === 'claude' ? (content ? parseMarkdown(content) : null) : null,
    streaming: pending,
  };
}

/** 以 document.execCommand('copy') 複製純文字（相容非安全上下文，不使用 navigator.clipboard）。 */
function copyTextExecCommand(text) {
  const t = text == null ? '' : String(text);
  if (!t) return false;
  let ta;
  try {
    ta = document.createElement('textarea');
    ta.value = t;
    ta.setAttribute('readonly', '');
    ta.style.position = 'fixed';
    ta.style.left = '-9999px';
    ta.style.top = '0';
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    return document.execCommand('copy');
  } catch (e) {
    return false;
  } finally {
    if (ta && ta.parentNode) ta.parentNode.removeChild(ta);
  }
}

function MessageCopyButton({ text, className }) {
  const [copied, setCopied] = useState(false);
  const empty = !String(text || '').trim();
  const onClick = (e) => {
    e.stopPropagation();
    if (empty) return;
    if (copyTextExecCommand(text)) {
      setCopied(true);
      setTimeout(() => setCopied(false), 2000);
    }
  };
  return (
    <button
      type="button"
      onClick={onClick}
      disabled={empty}
      title={copied ? '已複製' : '複製'}
      aria-label={copied ? '已複製到剪貼簿' : '複製訊息'}
      className={className}
    >
      {copied ? (
        <span className="text-[10px] font-medium leading-none">已複製</span>
      ) : (
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" className="w-3.5 h-3.5 opacity-70 hover:opacity-100" aria-hidden>
          <path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z" />
        </svg>
      )}
    </button>
  );
}

/** 將 assistant 訊息轉發到其他會話（Modal） */
function ForwardModal({
  payload,
  onClose,
  currentSessionId,
  onForwarded,
  allSessions,
  usePermModeDropdown = false,
}) {
  const allSessionsRef = useRef(allSessions);
  useEffect(() => { allSessionsRef.current = allSessions; }, [allSessions]);
  const [sessionsList, setSessionsList] = useState([]);
  const [loadingSessions, setLoadingSessions] = useState(false);
  const [selectedId, setSelectedId] = useState(null);
  const [copyFromId, setCopyFromId] = useState('');
  const [note, setNote] = useState('');
  const [newName, setNewName] = useState('');
  const [newWorkDir, setNewWorkDir] = useState('');
  const [newAgent, setNewAgent] = useState('claude');
  const [newMode, setNewMode] = useState('default');
  const [newCliExtra, setNewCliExtra] = useState('');
  const [forwardModel, setForwardModel] = useState('');
  const [busy, setBusy] = useState(false);
  const [errText, setErrText] = useState('');

  useEffect(() => {
    if (!payload) return;
    const prev = document.body.style.overflow;
    document.body.style.overflow = 'hidden';
    return () => { document.body.style.overflow = prev; };
  }, [payload]);

  useEffect(() => {
    if (!payload) return;
    setNote('');
    setErrText('');
    setBusy(false);
    setSessionsList([]);
    setSelectedId(null);
    setCopyFromId('');
    setNewName(
      `轉發·${new Date().toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit', second: '2-digit' })}`,
    );
    setNewWorkDir('');
    setNewAgent('claude');
    setNewMode('default');
    setNewCliExtra('');
    setForwardModel('');
    const inherited = allSessionsRef.current;
    if (Array.isArray(inherited) && inherited.length > 0) {
      setSessionsList(inherited);
      const targets = inherited.filter((s) => s.id !== currentSessionId);
      setSelectedId(targets[0]?.id ?? 'new');
      setCopyFromId(inherited[0]?.id ?? '');
    } else {
      (async () => {
        setLoadingSessions(true);
        try {
          const res = await apiFetch('/sessions');
          if (!res.ok) throw new Error('無法載入會話列表');
          const data = await res.json();
          const list = Array.isArray(data) ? data : [];
          const sorted = sortSessionsByWorkDirThenName(list);
          setSessionsList(sorted);
          const targets = sorted.filter((s) => s.id !== currentSessionId);
          setSelectedId(targets[0]?.id ?? 'new');
          setCopyFromId(sorted[0]?.id ?? '');
        } catch (e) {
          setErrText(e.message || String(e));
        } finally {
          setLoadingSessions(false);
        }
      })();
    }
  }, [payload, currentSessionId]);

  useEffect(() => {
    if (!copyFromId || !sessionsList.length) return;
    const s = sessionsList.find((x) => x.id === copyFromId);
    if (!s) return;
    const agent = s.agent_type || 'claude';
    setNewAgent(agent);
    setNewWorkDir(s.work_dir || '');
    setNewMode(normalizePermMode(agent, s.permission_mode || 'default'));
    const parts = Array.isArray(s.cli_extra_args) ? s.cli_extra_args : [];
    setForwardModel(extractModelFromCliArgs(parts));
    setNewCliExtra(cliArgsWithoutModel(parts).join('\n'));
  }, [copyFromId, sessionsList]);

  useEffect(() => {
    if (!payload) return;
    const h = (e) => {
      if (e.key === 'Escape') onClose();
    };
    window.addEventListener('keydown', h);
    return () => window.removeEventListener('keydown', h);
  }, [payload, onClose]);

  if (!payload) return null;

  const targets = sessionsList.filter((s) => s.id !== currentSessionId);
  const messageContent = String(payload.messageContent || '');

  const runForward = async () => {
    const composed = buildForwardUserPrompt(note, messageContent);
    if (!String(composed || '').trim()) {
      setErrText('沒有可轉發的內容');
      return;
    }
    setBusy(true);
    setErrText('');
    try {
      if (selectedId !== 'new') {
        if (!selectedId) throw new Error('請選擇目標會話');
        await sendPromptViaEphemeralWS(selectedId, composed);
        const target = sessionsList.find((s) => s.id === selectedId);
        if (!target) throw new Error('找不到目標會話');
        onForwarded({ messageKey: payload.messageKey, targetSession: target, jump: false });
        onClose();
        return;
      }
      if (!newName.trim()) {
        setErrText('請填寫新會話名稱');
        return;
      }
      const cliMerged = mergeModelIntoCliExtraLines(newCliExtra, forwardModel);
      const res = await apiFetch('/sessions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          name: newName.trim(),
          work_dir: newWorkDir.trim(),
          permission_mode: newMode,
          agent_type: newAgent,
          cli_extra_args: newAgent === 'claude' ? parseCliExtraArgs(cliMerged) : [],
          input_mode: 'agent',
        }),
      });
      if (!res.ok) {
        const j = await res.json().catch(() => ({}));
        throw new Error(j.error || `建立失敗 (${res.status})`);
      }
      const created = await res.json();
      await sendPromptViaEphemeralWS(created.id, composed);
      onForwarded({ messageKey: payload.messageKey, targetSession: created, jump: true });
      onClose();
    } catch (e) {
      setErrText(e.message || String(e));
    } finally {
      setBusy(false);
    }
  };

  return (
    <div
      className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/60 backdrop-blur-[2px]"
      onClick={onClose}
      role="presentation"
    >
      <div
        className="max-w-md sm:max-w-xl md:max-w-2xl w-full max-h-[min(90vh,32rem)] md:max-h-[min(92vh,48rem)] overflow-y-auto app-scroll rounded-2xl border border-slate-700 bg-slate-950/95 shadow-2xl shadow-black/50 p-4 md:p-6 space-y-3 md:space-y-4"
        onClick={(e) => e.stopPropagation()}
        role="dialog"
        aria-modal="true"
        aria-labelledby="forward-modal-title"
      >
        <div id="forward-modal-title" className="text-sm md:text-base font-semibold text-slate-100">
          Forward 到其他會話
        </div>
        {loadingSessions ? (
          <div className="text-xs text-slate-500 py-4 text-center">載入會話…</div>
        ) : (
          <>
            <div className="space-y-1.5">
              <div className="text-[10px] uppercase tracking-wide text-slate-500">目標會話</div>
              <div className="space-y-1 max-h-40 md:max-h-56 overflow-y-auto app-scroll pr-0.5">
                {targets.map((s) => {
                  const active = selectedId === s.id;
                  const shortDir = workDirGroupShortLabel(s.work_dir);
                  return (
                    <button
                      key={s.id}
                      type="button"
                      onClick={() => setSelectedId(s.id)}
                      className={`w-full flex items-center gap-2 rounded-lg border px-2.5 py-2 text-left text-sm transition-colors ${
                        active
                          ? 'border-cyan-400/50 bg-cyan-500/10 ring-2 ring-cyan-400/35'
                          : 'border-slate-700/80 bg-slate-900/40 hover:bg-slate-800/50'
                      }`}
                    >
                      <span
                        className={`inline-flex items-center gap-0.5 shrink-0 text-[10px] px-1.5 py-0.5 rounded-full font-mono uppercase ${getAgentBadgeClass(s.agent_type)}`}
                      >
                        <AgentBadgeIcon agentType={s.agent_type} />
                        {s.agent_type || 'claude'}
                      </span>
                      <span className="min-w-0 flex-1 truncate font-mono text-xs text-slate-300" title={s.work_dir || ''}>
                        {shortDir}
                      </span>
                    </button>
                  );
                })}
                <button
                  type="button"
                  onClick={() => setSelectedId('new')}
                  className={`w-full rounded-lg border px-2.5 py-2 text-left text-sm transition-colors ${
                    selectedId === 'new'
                      ? 'border-cyan-400/50 bg-cyan-500/10 ring-2 ring-cyan-400/35 text-cyan-200'
                      : 'border-dashed border-slate-600 bg-slate-900/30 text-slate-400 hover:border-cyan-500/30 hover:text-cyan-300'
                  }`}
                >
                  ＋ 新建會話
                </button>
              </div>
            </div>

            {selectedId === 'new' && (
              <div className="mt-2 p-3 rounded-lg bg-slate-800/50 border border-slate-700 space-y-2.5">
                <div className="space-y-1">
                  <label className="text-[10px] text-slate-500">複製自</label>
                  <select
                    value={copyFromId}
                    onChange={(e) => setCopyFromId(e.target.value)}
                    className="w-full bg-slate-900/80 border border-slate-600 rounded-lg px-2 py-2 text-xs text-slate-200"
                  >
                    {sessionsList.length === 0 ? (
                      <option value="">（尚無會話）</option>
                    ) : (
                      sessionsList.map((s) => (
                        <option key={s.id} value={s.id}>
                          {(s.agent_type || 'claude') + ' · ' + workDirGroupShortLabel(s.work_dir)}
                        </option>
                      ))
                    )}
                  </select>
                </div>
                <div className="space-y-1">
                  <label className="text-[10px] text-slate-500">Agent</label>
                  <select
                    value={newAgent}
                    onChange={(e) => {
                      const next = e.target.value;
                      setNewAgent(next);
                      setNewMode((prev) => normalizePermMode(next, prev));
                    }}
                    className="w-full bg-slate-900/80 border border-slate-600 rounded-lg px-2 py-2 text-xs text-slate-200"
                  >
                    <option value="claude">Claude</option>
                    <option value="cursor">Cursor</option>
                    <option value="gemini">Gemini</option>
                    <option value="codex" disabled>Codex（未支援）</option>
                  </select>
                </div>
                <div className="space-y-1">
                  <label className="text-[10px] text-slate-500">工作目錄</label>
                  <input
                    value={newWorkDir}
                    onChange={(e) => setNewWorkDir(e.target.value)}
                    placeholder="/path/to/project"
                    className="w-full bg-slate-900/80 border border-slate-600 rounded-lg px-2 py-2 text-xs text-slate-100 font-mono placeholder-slate-600"
                  />
                </div>
                <div className="space-y-1">
                  <label className="text-[10px] text-slate-500">Model（選填，寫入 --model）</label>
                  <input
                    value={forwardModel}
                    onChange={(e) => setForwardModel(e.target.value)}

                  />
                </div>
                <div className="space-y-1">
                  <label className="text-[10px] text-slate-500">權限模式</label>
                  {usePermModeDropdown ? (
                    <PermModeSelect
                      agentType={newAgent}
                      value={newMode}
                      onChange={setNewMode}
                      disabled={newAgent === 'codex'}
                      id="forward-new-perm-mode"
                      className="w-full py-2 text-xs"
                    />
                  ) : (
                    <PermModeSwitch
                      agentType={newAgent}
                      value={newMode}
                      onChange={setNewMode}
                      disabled={newAgent === 'codex'}
                    />
                  )}
                </div>
                {newAgent === 'claude' && (
                  <div className="space-y-1">
                    <label className="text-[10px] text-slate-500">自訂 CLI 引數（選填，不含 --model）</label>
                    <textarea
                      value={newCliExtra}
                      onChange={(e) => setNewCliExtra(e.target.value)}
                      rows={3}
                      spellCheck={false}
                      className="w-full bg-slate-900/80 border border-slate-600 rounded-lg px-2 py-2 text-xs text-slate-100 font-mono placeholder-slate-600 app-scroll"

                  <label className="text-[10px] text-slate-500">新會話名稱（必填）</label>
                  <input
                    value={newName}
                    onChange={(e) => setNewName(e.target.value)}

                  />

            )}

            <div className="space-y-1">
              <label className="text-[10px] text-slate-500">備註（可選）</label>
              <textarea
                value={note}
                onChange={(e) => setNote(e.target.value)}

                className="w-full bg-slate-900/70 border border-slate-600 rounded-lg px-2 py-2 text-sm text-slate-100 placeholder-slate-500 focus:outline-none focus:border-cyan-500/45"

            <div className="flex flex-wrap gap-2 justify-end pt-1">
              <button
                type="button"

              >

              >
                {busy ? '送出中…' : 'Forward'}
              </button>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

  const [groupByDir, setGroupByDir] = useState(() => readStoredGroupByDir());

  const [newDir, setNewDir]       = useState('');
  const [newMode, setNewMode]     = useState('default');
  const [newAgent, setNewAgent]   = useState('claude');

  const [renameVal, setRenameVal]   = useState('');
  const renameInputRef = useRef(null);

    try {
      const res = await apiFetch('/sessions');
