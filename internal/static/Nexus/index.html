        console.warn('[sessions] load failed', res.status);
        return;
      }
      const data = await res.json();
      if (Array.isArray(data)) {
        const sorted = sortSessionsByWorkDirThenName(data);
        setSessions(sorted);
        onSessionsLoaded?.(sorted);
      } else {
        console.warn('[sessions] unexpected payload', data);
      }
    } catch (err) {
      console.warn('[sessions] load error', err);
    }
  };

  useEffect(() => { load(); }, []);

  useEffect(() => {
    const id = setInterval(() => { load(); }, 5000);
    return () => clearInterval(id);
  }, []);

  useEffect(() => {
    if (renamingId) renameInputRef.current?.focus();
  }, [renamingId]);

  const create = async () => {
    if (!newName.trim()) return;
    setLoading(true);
    await apiFetch('/sessions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        name: newName.trim(),
        work_dir: newDir.trim(),
        permission_mode: newMode,
        agent_type: newAgent,
        cli_extra_args: newAgent === 'claude' ? parseCliExtraArgs(newCliExtra) : [],
      }),
    });
    setNewName(''); setNewDir(''); setNewMode('default'); setNewAgent('claude'); setNewCliExtra('');
    setShowForm(false);
    setLoading(false);
    load();
  };

  const del = async (id, e) => {
    e.stopPropagation();
    if (!confirm('確定刪除此 Session 及所有對話紀錄？')) return;
    await apiFetch(`/sessions/${id}`, { method: 'DELETE' });
    load();
  };

  const startRename = (s, e) => {
    e.stopPropagation();
    setRenamingId(s.id);
    setRenameVal(s.name || '');
  };

  const commitRename = async (id) => {
    const trimmed = renameVal.trim();
    if (trimmed) {
      await apiFetch(`/sessions/${id}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: trimmed }),
      });
      await load();
    }
    setRenamingId(null);
    setRenameVal('');
  };

  const handleRenameKey = (e, id) => {
    if (e.key === 'Enter') { e.preventDefault(); commitRename(id); }
    if (e.key === 'Escape') { setRenamingId(null); setRenameVal(''); }
  };

  const sortOptions = [
    { value: 'last_active_desc', label: '活動 新→舊' },
    { value: 'last_active_asc', label: '活動 舊→新' },
    { value: 'name_asc', label: '名稱 A→Z' },
    { value: 'name_desc', label: '名稱 Z→A' },
    { value: 'agent_asc', label: 'Runner' },
  ];

  const displaySessions = useMemo(() => {
    const q = sessionSearch.trim().toLowerCase();
    let list = Array.isArray(sessions) ? sessions : [];
    if (q) {
      list = list.filter((s) => {
        const parts = [
          s.name,
          s.work_dir,
          s.git_branch,
          s.description,
          s.agent_type,
          s.agent_session_id,
          s.id,
          ...(Array.isArray(s.cli_extra_args) ? s.cli_extra_args : []),
        ]
          .filter(Boolean)
          .join(' ')
          .toLowerCase();
        return parts.includes(q);
      });
    }
    const out = [...list];
    const cmpName = (a, b) => (a.name || '').localeCompare(b.name || '', 'zh-Hant');
    const cmpAgent = (a, b) => (a.agent_type || '').localeCompare(b.agent_type || '');
    if (sessionSort === 'last_active_asc' || sessionSort === 'last_active_desc') {
      const groupMaxMs = new Map();
      for (const s of out) {
        const k = String(s.work_dir != null ? String(s.work_dir).trim() : '').toLowerCase();
        const t = sessionLastActiveMs(s);
        if (!groupMaxMs.has(k) || t > groupMaxMs.get(k)) groupMaxMs.set(k, t);
      }
      const sign = sessionSort === 'last_active_desc' ? 1 : -1;
      out.sort((a, b) => {
        const ka = String(a.work_dir != null ? String(a.work_dir).trim() : '').toLowerCase();
        const kb = String(b.work_dir != null ? String(b.work_dir).trim() : '').toLowerCase();
        const gd = sign * ((groupMaxMs.get(kb) ?? 0) - (groupMaxMs.get(ka) ?? 0));
        if (gd !== 0) return gd;
        return sign * (sessionLastActiveMs(b) - sessionLastActiveMs(a));
      });
    } else {
      out.sort((a, b) => {
        const wd = cmpSessionWorkDir(a, b);
        if (wd !== 0) return wd;
        switch (sessionSort) {
          case 'name_asc':  return cmpName(a, b);
          case 'name_desc': return cmpName(b, a);
          case 'agent_asc': return cmpAgent(a, b) || cmpName(a, b);
          default: return 0;
        }
      });
    }
    return out;
  }, [sessions, sessionSearch, sessionSort]);

  const sortedSessionsForForward = useMemo(() => {
    const out = [...(Array.isArray(sessions) ? sessions : [])];
    const cmpName = (a, b) => (a.name || '').localeCompare(b.name || '', 'zh-Hant');
    const cmpAgent = (a, b) => (a.agent_type || '').localeCompare(b.agent_type || '');
    if (sessionSort === 'last_active_asc' || sessionSort === 'last_active_desc') {
      const groupMaxMs = new Map();
      for (const s of out) {
        const k = String(s.work_dir != null ? String(s.work_dir).trim() : '').toLowerCase();
        const t = sessionLastActiveMs(s);
        if (!groupMaxMs.has(k) || t > groupMaxMs.get(k)) groupMaxMs.set(k, t);
      }
      const sign = sessionSort === 'last_active_desc' ? 1 : -1;
      out.sort((a, b) => {
        const ka = String(a.work_dir != null ? String(a.work_dir).trim() : '').toLowerCase();
        const kb = String(b.work_dir != null ? String(b.work_dir).trim() : '').toLowerCase();
        const gd = sign * ((groupMaxMs.get(kb) ?? 0) - (groupMaxMs.get(ka) ?? 0));
        if (gd !== 0) return gd;
        return sign * (sessionLastActiveMs(b) - sessionLastActiveMs(a));
      });
    } else {
      out.sort((a, b) => {
        const wd = cmpSessionWorkDir(a, b);
        if (wd !== 0) return wd;
        switch (sessionSort) {
          case 'name_asc':  return cmpName(a, b);
          case 'name_desc': return cmpName(b, a);
          case 'agent_asc': return cmpAgent(a, b) || cmpName(a, b);
          default: return 0;
        }
      });
    }
    return out;
  }, [sessions, sessionSort]);

  useEffect(() => { onSortedSessionsChange?.(sortedSessionsForForward); }, [sortedSessionsForForward]);

  const groupedSessions = useMemo(() => {
    if (!groupByDir) return null;
    const map = new Map();
    const unset = '（未設定工作目錄）';
    for (const s of displaySessions) {
      const raw = s.work_dir != null ? String(s.work_dir).trim() : '';
      const key = raw || unset;
      if (!map.has(key)) map.set(key, []);
      map.get(key).push(s);
    }
    return [...map.entries()].sort((a, b) => {
      const ka = String(a[0]);
      const kb = String(b[0]);
      if (ka === unset && kb !== unset) return 1;
      if (ka !== unset && kb === unset) return -1;
      if (sessionSort === 'last_active_asc' || sessionSort === 'last_active_desc') {
        const maxA = Math.max(0, ...a[1].map(sessionLastActiveMs));
        const maxB = Math.max(0, ...b[1].map(sessionLastActiveMs));
        if (maxA !== maxB) return sessionSort === 'last_active_desc' ? maxB - maxA : maxA - maxB;
      }
      return ka.localeCompare(kb, undefined, { numeric: true, sensitivity: 'base' });
    });
  }, [groupByDir, displaySessions, sessionSort]);

  const sessionSearchActive = sessionSearch.trim().length > 0;

  const toggleDirCollapsed = (dirKey) => {
    setCollapsedDirs((prev) => {
      const next = new Set(prev);
      if (next.has(dirKey)) next.delete(dirKey);
      else next.add(dirKey);
      return next;
    });
  };

  const openNewSessionForDir = (dirKey) => {
    const unset = '（未設定工作目錄）';
    setNewDir(dirKey === unset ? '' : dirKey);
    setShowForm(true);
  };

  const renderSessionRow = (s, groupIndent) => (
    <div
      key={s.id}
      className={groupIndent ? 'pl-3 border-l border-cyan-500/10' : ''}
    >
      <div
        onClick={() => renamingId !== s.id && onEnter(s)}
        className="group flex items-center justify-between gap-3 rounded-2xl border border-cyan-500/10 bg-slate-950/50 px-3.5 py-3.5 hover:border-cyan-400/25 hover:bg-slate-900/60 active:scale-[0.99] cursor-pointer transition-all shadow-sm shadow-black/20"
      >
        <div className="min-w-0 flex-1 mr-2">
          {renamingId === s.id ? (
            <input
              ref={renameInputRef}
              value={renameVal}
              onChange={(e) => setRenameVal(e.target.value)}
              onKeyDown={(e) => handleRenameKey(e, s.id)}
              onBlur={() => commitRename(s.id)}
              onClick={(e) => e.stopPropagation()}
              className="w-full bg-slate-800 border border-cyan-500/50 rounded-lg px-2 py-1 text-sm text-slate-100 focus:outline-none"
            />
          ) : (
            <div className="space-y-1.5 min-w-0">
              <div className="text-sm font-semibold text-slate-50 break-words [overflow-wrap:anywhere] leading-snug nexus-display tracking-tight">
                {s.name || '未命名'}
              </div>
              <div className="flex flex-wrap items-center gap-1.5">
                <span className={`inline-flex items-center gap-1 shrink-0 text-[10px] px-2 py-0.5 rounded-full font-mono uppercase ${getAgentBadgeClass(s.agent_type)}`}>
                  <AgentBadgeIcon agentType={s.agent_type} />
                  {AGENT_LABEL[s.agent_type] || s.agent_type || 'claude'}
                </span>
                <GitBranchBadge branch={s.git_branch} />
                {((s.agent_type || 'claude') !== 'codex') && s.permission_mode && (
                  <span
                    className="inline-flex items-center shrink-0 text-[10px] px-2 py-0.5 rounded-full font-mono text-slate-300 bg-slate-800/90 border border-white/10"
                    title="權限模式"
                  >
                    {PERM_MODE_LABEL[s.permission_mode] || s.permission_mode}
                  </span>
                )}
                {Array.isArray(s.cli_extra_args) && s.cli_extra_args.length > 0 && (
                  <span
                    className="inline-flex items-center shrink-0 text-[10px] px-2 py-0.5 rounded-full font-mono text-cyan-200/90 bg-cyan-950/40 border border-cyan-500/25"
                    title="已設定自訂 CLI 引數"
                  >
                    +{s.cli_extra_args.length} argv
                  </span>
                )}
              </div>
            </div>
          )}
          {s.work_dir && (
            <div className="text-xs text-slate-500 font-mono mt-0.5 truncate">{s.work_dir}</div>
          )}
        </div>
        <div className="flex items-center gap-1.5 shrink-0">
          {(s.status === 'running') && (
            <span className="relative flex h-2 w-2 shrink-0" title="執行中">
              <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-cyan-400 opacity-75" />
              <span className="relative inline-flex rounded-full h-2 w-2 bg-cyan-500" />
            </span>
          )}
          {(s.status === 'awaiting_confirm') && (
            <span className="text-amber-400 text-sm shrink-0 font-bold" title="待授權">!</span>
          )}
          <button
            type="button"
            onClick={(e) => startRename(s, e)}
            aria-label="重新命名"
            title="重新命名"
            className="text-slate-600 hover:text-cyan-400 p-1.5 rounded-lg transition-colors inline-flex items-center justify-center"
          >
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-4 h-4 shrink-0" aria-hidden="true">
              <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
              <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
            </svg>
          </button>
          <button
            onClick={(e) => del(s.id, e)}
            className="text-slate-500 hover:text-red-400 px-2 py-1 text-xs rounded-lg transition-colors"
          >
            刪除
          </button>
        </div>
      </div>
    </div>
  );

  return (
    <div className="flex flex-col h-app min-w-0 overflow-hidden">
      {/* 頂欄：玻璃質感 + 雙行標題 */}
      <div
        className="flex items-center justify-between px-4 py-3 shrink-0 border-b border-cyan-500/10 bg-slate-950/40 backdrop-blur-xl"
        style={{ paddingTop: 'calc(0.75rem + env(safe-area-inset-top) + var(--tg-content-safe-top))' }}
      >
        <div className="min-w-0">
          <div className="nexus-display text-lg font-semibold tracking-tight bg-gradient-to-r from-cyan-200 via-teal-100 to-cyan-300 bg-clip-text text-transparent">
            Claude Code
          </div>
          <div className="text-[10px] uppercase tracking-[0.22em] text-cyan-500/70 font-medium mt-0.5">Nexus 介面</div>
        </div>
        <button
          type="button"
          onClick={() => setShowForm(!showForm)}
          aria-label={showForm ? '關閉建立表單' : '建立新 Session'}
          title={showForm ? '關閉' : '新 Session'}
          className="group relative flex h-11 w-11 shrink-0 items-center justify-center rounded-2xl bg-gradient-to-br from-cyan-500 via-teal-500 to-cyan-600 text-slate-950 shadow-lg shadow-cyan-950/40 ring-1 ring-white/20 transition hover:scale-[1.04] hover:shadow-cyan-500/25 active:scale-95 focus:outline-none focus-visible:ring-2 focus-visible:ring-cyan-400 focus-visible:ring-offset-2 focus-visible:ring-offset-slate-950"
        >
          <span className="absolute inset-0 rounded-2xl bg-gradient-to-t from-black/15 to-transparent opacity-0 transition group-hover:opacity-100" aria-hidden />
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            strokeWidth="2.25"
            strokeLinecap="round"
            className={`relative h-5 w-5 transition-transform duration-200 ease-out ${showForm ? 'rotate-45' : 'group-hover:rotate-90'}`}
            aria-hidden
          >
            <path d="M12 5v14M5 12h14" />
          </svg>
        </button>
      </div>

      {/* 搜尋／排序（有 Session 時顯示） */}
      {sessions.length > 0 && (
        <div className="px-3 py-2.5 shrink-0 flex gap-2 min-w-0 items-center border-b border-white/[0.04] bg-slate-950/25">
          <input
            type="search"
            value={sessionSearch}
            onChange={(e) => setSessionSearch(e.target.value)}
            placeholder="搜尋…"
            autoComplete="off"
            className="flex-1 min-w-0 bg-slate-900/70 border border-cyan-500/15 rounded-xl px-3 py-2 text-sm text-slate-100 placeholder-slate-500 focus:outline-none focus:border-cyan-500/40 focus:ring-1 focus:ring-cyan-500/20"
          />
          <button
            type="button"
            onClick={() => {
              setGroupByDir((v) => {
                const next = !v;
                try {
                  localStorage.setItem(SESSION_LIST_GROUP_BY_DIR_KEY, next ? '1' : '0');
                } catch (_) {}
                return next;
              });
            }}
            aria-pressed={groupByDir}
            title={groupByDir ? '關閉依目錄分組' : '依工作目錄分組'}
            aria-label={groupByDir ? '關閉依目錄分組' : '依工作目錄分組'}
            className={`shrink-0 flex h-10 w-10 items-center justify-center rounded-xl border transition-colors focus:outline-none focus-visible:ring-2 focus-visible:ring-cyan-500/50 focus-visible:ring-offset-1 focus-visible:ring-offset-slate-950 ${
              groupByDir
                ? 'border-cyan-500/45 bg-cyan-500/15 text-cyan-300 shadow-[inset_0_1px_0_rgba(34,211,238,0.12)]'
                : 'border-cyan-500/15 bg-slate-900/80 text-slate-400 hover:text-cyan-200/90 hover:border-cyan-500/30'
            }`}
          >
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round" className="w-5 h-5" aria-hidden>
              <path d="M3 7.5h7L10.5 6h11v12a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-8.5Z" />
              <path d="M3 7.5V6a2 2 0 0 1 2-2h3l1.5 1.5" />
            </svg>
          </button>
          <span className="shrink-0 text-xs text-slate-500 whitespace-nowrap" id="session-sort-label">排序</span>
          <select
            id="session-sort"
            value={sessionSort}
            onChange={(e) => setSessionSort(e.target.value)}
            title="左側 Session 列表的排序方式"
            aria-labelledby="session-sort-label"
            className="shrink-0 bg-slate-900/80 border border-cyan-500/15 rounded-xl px-2.5 py-2 text-sm text-slate-200 focus:outline-none focus:border-cyan-500/40 cursor-pointer max-w-[9.5rem]"
          >
            {sortOptions.map((opt) => (
              <option key={opt.value} value={opt.value}>{opt.label}</option>
            ))}
          </select>
        </div>
      )}

      {/* 建立表單 */}
      {showForm && (
        <div className="px-4 py-4 space-y-3 shrink-0 min-w-0 border-b border-cyan-500/10 bg-gradient-to-b from-slate-900/50 to-transparent nexus-card-enter">
          <input value={newName} onChange={e => setNewName(e.target.value)}
            placeholder="Session 名稱（必填）"
            className="w-full min-w-0 bg-slate-900/60 border border-cyan-500/15 rounded-xl px-3 py-2.5 text-sm text-slate-100 placeholder-slate-500 focus:outline-none focus:border-cyan-500/45 focus:ring-1 focus:ring-cyan-500/15" />
          <input value={newDir} onChange={e => setNewDir(e.target.value)}
            placeholder="工作目錄（選填，如 /home/user/project）"
            className="w-full min-w-0 bg-slate-900/60 border border-cyan-500/15 rounded-xl px-3 py-2.5 text-sm text-slate-100 placeholder-slate-500 focus:outline-none focus:border-cyan-500/45 font-mono" />
          <div className="min-w-0 space-y-2">
            <select
              value={newAgent}
              onChange={(e) => {
                const next = e.target.value;
                setNewAgent(next);
                setNewMode((prev) => normalizePermMode(next, prev));
              }}
              className="w-full min-w-0 bg-slate-900/70 border border-cyan-500/15 rounded-xl px-3 py-2.5 text-sm text-slate-200"
            >
              <option value="claude">Claude</option>
              <option value="cursor">Cursor</option>
              <option value="gemini">Gemini</option>
              <option value="codex" disabled>Codex（未支援）</option>
            </select>
            <div className="min-w-0">
              {usePermModeDropdown ? (
                <div className="flex items-center gap-2 min-w-0">
                  <span className="shrink-0 text-xs text-slate-500">權限</span>
                  <PermModeSelect
                    agentType={newAgent}
                    value={newMode}
                    onChange={setNewMode}
                    disabled={newAgent === 'codex'}
                    id="session-new-perm-mode-nexus"
                    className="flex-1 min-w-0 py-2"
                  />
                </div>
              ) : (
                <>
                  <div className="mb-1 text-[10px] uppercase tracking-wide text-slate-500">權限模式</div>
                  <PermModeSwitch
                    agentType={newAgent}
                    value={newMode}
                    onChange={setNewMode}
                    disabled={newAgent === 'codex'}
                  />
                </>
              )}
            </div>
          </div>
          {newAgent === 'claude' && (
            <div className="min-w-0 space-y-1">
              <div className="text-[10px] uppercase tracking-wide text-slate-500">自訂 CLI 引數（選填）</div>
              <textarea
                value={newCliExtra}
                onChange={(e) => setNewCliExtra(e.target.value)}
                placeholder={'每行一個引數，例如：\n--plugin-dir\n./.claude/plugins/crm\n--plugin-dir\n./.claude/plugins/crm2\n含空格的路徑請寫在同一行。'}
                rows={5}
                spellCheck={false}
                className="w-full min-w-0 bg-slate-900/60 border border-cyan-500/15 rounded-xl px-3 py-2 text-sm text-slate-100 placeholder-slate-500 focus:outline-none focus:border-cyan-500/45 font-mono leading-relaxed overflow-y-auto app-scroll"
              />
            </div>
          )}
          <div className="flex flex-wrap gap-2 justify-end">
            <button onClick={create} disabled={loading || !newName.trim()}
              className="px-5 py-2.5 rounded-xl text-sm font-semibold shrink-0 bg-gradient-to-r from-cyan-500 to-teal-600 text-slate-950 hover:brightness-110 disabled:opacity-40 shadow-lg shadow-cyan-950/40">
              建立
            </button>
            <button onClick={() => setShowForm(false)}
              className="px-4 py-2.5 bg-slate-800/90 hover:bg-slate-700/90 text-slate-300 rounded-xl text-sm shrink-0 border border-white/5">
              取消
            </button>
          </div>
        </div>
      )}

      {/* Session 列表（卡片式） */}
      <div className="flex-1 overflow-y-auto app-scroll px-3 py-3 space-y-2.5">
        {sessions.length === 0 ? (
          <div className="text-center text-slate-500 mt-24 text-sm px-4">尚無 Session，點右上角按鈕建立</div>
        ) : displaySessions.length === 0 ? (
          <div className="text-center text-slate-500 mt-24 text-sm px-4">沒有符合搜尋條件的 Session</div>
        ) : groupByDir && groupedSessions ? (
          groupedSessions.map(([dirKey, dirSessions]) => {
            const expanded = sessionSearchActive || !collapsedDirs.has(dirKey);
            const shortLabel = workDirGroupShortLabel(dirKey);
            return (
              <div key={dirKey} className="space-y-2">
                <div className="flex w-full min-w-0 items-center gap-1 rounded-xl px-0.5 py-0.5 transition-colors hover:bg-white/[0.04]">
                  <button
                    type="button"
                    onClick={() => toggleDirCollapsed(dirKey)}
                    className="flex min-w-0 flex-1 items-center gap-2 rounded-lg px-0.5 py-1 text-left focus:outline-none focus-visible:ring-2 focus-visible:ring-cyan-500/45 focus-visible:ring-offset-1 focus-visible:ring-offset-slate-950"
                  >
                    <span className="shrink-0 text-slate-500 w-4 text-center" aria-hidden>
                      {expanded ? '▼' : '▶'}
                    </span>
                    <span
                      className="min-w-0 flex-1 truncate text-[10px] tracking-wide text-slate-400 font-medium"
                      title={dirKey}
                    >
                      {shortLabel}
                    </span>
                    <span className="shrink-0 rounded-full bg-slate-800/90 px-2 py-0.5 text-[10px] font-mono text-slate-300 ring-1 ring-white/10">
                      {dirSessions.length}
                    </span>
                  </button>
                  <button
                    type="button"
                    onClick={() => openNewSessionForDir(dirKey)}
                    className="shrink-0 rounded-lg px-2 py-1 text-[10px] font-semibold text-cyan-400/95 hover:bg-cyan-500/10 hover:text-cyan-300 focus:outline-none focus-visible:ring-2 focus-visible:ring-cyan-500/45 focus-visible:ring-offset-1 focus-visible:ring-offset-slate-950"
                  >
                    ＋新 Session
                  </button>
                </div>
                {expanded && dirSessions.map((s) => renderSessionRow(s, true))}
              </div>
            );
          })
        ) : (
          displaySessions.map((s) => renderSessionRow(s, false))
        )}
      </div>
    </div>
  );
}

/** Slash 命令選單（Nexus 主題） */
function SlashCommandMenu({ items, activeIndex, onSelect }) {
  const listRef = useRef(null);
  useLayoutEffect(() => {
    const root = listRef.current;
    const el = root?.querySelector?.(`[data-slash-idx="${activeIndex}"]`);
    if (el && typeof el.scrollIntoView === 'function') {
      el.scrollIntoView({ block: 'nearest' });
    }
  }, [activeIndex, items]);
  return (
    <div
      ref={listRef}
      role="listbox"
      aria-label="Slash 命令"
      className="absolute bottom-full left-0 right-0 z-20 mb-1 max-h-48 overflow-y-auto app-scroll rounded-2xl border border-cyan-500/20 bg-slate-950/95 py-1 shadow-lg backdrop-blur-sm"
    >
      {items.map((c, i) => (
        <button
          key={c.command}
          type="button"
          role="option"
          aria-selected={i === activeIndex}
          data-slash-idx={i}
          onMouseDown={(e) => e.preventDefault()}
          onClick={() => onSelect(c.command)}
          className={`flex w-full items-start gap-2 px-3 py-2 text-left text-sm transition-colors hover:bg-slate-800/90 ${
            i === activeIndex ? 'bg-cyan-950/40' : ''
          }`}
        >
          <span className="shrink-0 font-mono text-cyan-300">{c.command}</span>
          <span className="min-w-0 flex-1 text-slate-400">{c.description}</span>
        </button>
      ))}
    </div>
  );
}

// ── 聊天畫面 ─────────────────────────────────────────────────────────────────
function ChatView({ session, onBack, showBack = true, fullHeight = true, usePermModeDropdown = false, onJumpToSession, allSessions }) {
  const jumpToSession = typeof onJumpToSession === 'function' ? onJumpToSession : () => {};
  const agentType = session.agent_type || 'claude';
  // Claude / Cursor / Gemini 皆支援 mode 切換（Codex 暫無對應概念）
  const showPermModeSelect = agentType !== 'codex';
  const [messages, setMessages]   = useState([]);
  const [input, setInput]         = useState('');
  const [state, setState]         = useState('IDLE');
  const [permTools, setPermTools] = useState([]);
  const [mode, setMode]           = useState(() => normalizePermMode(agentType, session.permission_mode || 'default'));
  const [histLoaded, setHistLoaded] = useState(false);
  const [inputMode, setInputMode]   = useState(() => readInputModeForSession(session.id));
  const [shellRequest, setShellRequest] = useState(null);
  const [forwardModal, setForwardModal] = useState(null);
  const [forwardHints, setForwardHints] = useState({});
  const [slashMenuItems, setSlashMenuItems] = useState([]);
  const [slashActiveIdx, setSlashActiveIdx] = useState(0);
  const wsRef     = useRef(null);
  const bottomRef = useRef(null);
  const chatScrollRef = useRef(null);
  const chatNearBottomRef = useRef(true);
  const chatInputRef = useRef(null);
  const slashInputWrapRef = useRef(null);
  const streamBuf = useRef('');
  const connGenRef = useRef(0);
  const activeSessionRef = useRef(session.id);
  const reconnectTimerRef = useRef(null);
  const serverPermAppliedRef = useRef(null);
  const serverInputAppliedRef = useRef(null);

  const syncChatNearBottom = useCallback(() => {
    const el = chatScrollRef.current;
    if (!el) return;
    const gap = el.scrollHeight - el.scrollTop - el.clientHeight;
    chatNearBottomRef.current = gap < 80;
  }, []);

  // 捲到底
  useEffect(() => {
    bottomRef.current?.scrollIntoView({ behavior: 'smooth' });
    let id2;
    const id1 = requestAnimationFrame(() => {
      id2 = requestAnimationFrame(() => {
        syncChatNearBottom();
      });
    });
    return () => {
      cancelAnimationFrame(id1);
      if (id2 != null) cancelAnimationFrame(id2);
    };
  }, [messages, syncChatNearBottom]);

  // 待授權／Shell 確認區塊出現時捲到底（此狀態常不經 messages 更新而單獨出現）
  useEffect(() => {
    const showPermPanel =
      (state === 'AWAITING_CONFIRM' && permTools.length > 0) ||
      (state === 'AWAITING_SHELL_CONFIRM' && shellRequest);
    if (!showPermPanel) return;
    let id2;
    const id1 = requestAnimationFrame(() => {
      id2 = requestAnimationFrame(() => {
        bottomRef.current?.scrollIntoView({ behavior: 'smooth' });
      });
    });
    return () => {
      cancelAnimationFrame(id1);
      if (id2 != null) cancelAnimationFrame(id2);
    };
  }, [state, permTools.length, shellRequest]);

  // 離開頁面確認（任務進行中或等待授權時）
  useEffect(() => {
    const handler = (e) => {
      if (state === 'THINKING' || state === 'STREAMING' || state === 'AWAITING_CONFIRM' || state === 'AWAITING_SHELL_CONFIRM' || state === 'SHELL_EXEC') {
        e.preventDefault();
        e.returnValue = '';
      }
    };
    window.addEventListener('beforeunload', handler);
    return () => window.removeEventListener('beforeunload', handler);
  }, [state]);

  // session 切換時重置顯示與狀態，避免殘留舊會話上下文
  useEffect(() => {
    activeSessionRef.current = session.id;
    streamBuf.current = '';
    setMessages([]);
    setHistLoaded(false);
    setState('IDLE');
    setPermTools([]);
    setShellRequest(null);
    setInput('');
    setSlashMenuItems([]);
    setSlashActiveIdx(0);
    const im =
      session.input_mode === 'shell' || session.input_mode === 'agent'
        ? session.input_mode
        : readInputModeForSession(session.id);
    const pm = normalizePermMode(agentType, session.permission_mode || 'default');
    serverInputAppliedRef.current = im;
    serverPermAppliedRef.current = pm;
    setInputMode(im);
    setMode(pm);
  }, [session.id, session.permission_mode, agentType, session.input_mode]);

  // 載入歷史 + 建立 WS
  useEffect(() => {
    connGenRef.current += 1;
    const effectGen = connGenRef.current;
    let cancelled = false;

    const isCurrent = () =>
      !cancelled && effectGen === connGenRef.current && activeSessionRef.current === session.id;

    const clearReconnectTimer = () => {
      if (reconnectTimerRef.current) {
        clearTimeout(reconnectTimerRef.current);
        reconnectTimerRef.current = null;
      }
    };

    const init = async () => {
      // 載入歷史紀錄
      let hist = [];
      try {
        const res = await apiFetch(`/sessions/${session.id}/messages`);
        if (res.ok) {
          const data = await res.json();
          if (Array.isArray(data)) hist = data;
          else console.warn('[messages] unexpected payload', data);
        } else {
          console.warn('[messages] load failed', res.status);
        }
      } catch (err) {
        console.warn('[messages] load error', err);
      }
      if (isCurrent()) {
        setMessages(hist.map(mapMessageRow));
        const lastClaude = [...hist].reverse().find((m) => m.role === 'claude' && m.status === 'pending');
        streamBuf.current = lastClaude ? (lastClaude.content || '') : '';
        setHistLoaded(true);
      }

      // 建立 WebSocket
      connectWS();
    };

    const connectWS = () => {
      if (!isCurrent()) return;
      clearReconnectTimer();
      const ws = new WebSocket(wsURL(session.id));
      ws._sessionId = session.id;
      ws._gen = effectGen;
      wsRef.current = ws;

      ws.onmessage = (evt) => {
        if (!isCurrent() || wsRef.current !== ws) return;
        const msg = JSON.parse(evt.data);

        if (msg.type === 'sync') {
          setState(msg.value);
          if (msg.input_mode) {
            setInputMode(msg.input_mode);
            serverInputAppliedRef.current = msg.input_mode;
          }
          if (msg.messages) {
            const rows = Array.isArray(msg.messages) ? msg.messages : JSON.parse(msg.messages);
            const mapped = rows.map(mapMessageRow);
            const lastClaude = [...rows].reverse().find((m) => m.role === 'claude' && (m.status || 'done') === 'pending');
            streamBuf.current = lastClaude ? (lastClaude.content || '') : '';
            setMessages(mapped);
          }
          return;
        }

        if (msg.type === 'status') {
          setState(msg.value);
          if (msg.value !== 'AWAITING_SHELL_CONFIRM') {
            setShellRequest(null);
          }
          if (msg.value === 'THINKING') {
            streamBuf.current = '';
            setMessages((prev) => {
              const last = prev[prev.length - 1];
              if (last && last.role === 'claude' && last.streaming && last.status === 'pending') {
                return prev;
              }
              return [...prev, { role: 'claude', content: '', html: null, streaming: true, status: 'pending' }];
            });
          }
          if (msg.value === 'SHELL_EXEC') {
            setMessages((prev) => {
              const last = prev[prev.length - 1];
              if (last && last.role === 'shell' && last.streaming && last.status === 'pending') {
                return prev;
              }
              return [...prev, { role: 'shell', content: '', html: null, streaming: true, status: 'pending' }];
            });
          }
          if (msg.value === 'IDLE' || msg.value === 'AWAITING_CONFIRM') {
            setMessages((prev) => {
              const updated = prev.map((m, i) =>
                i === prev.length - 1 ? { ...m, streaming: false, status: m.status === 'pending' ? 'done' : m.status } : m
              );
              const last = updated[updated.length - 1];
              if (last && last.role === 'claude' && last.id == null && !last.content && !last.html) {
                return updated.slice(0, -1);
              }
              return updated;
            });
          }
        }

        if (msg.type === 'reset') {
          setMessages([]);
          streamBuf.current = '';
        }

        if (msg.type === 'user_message') {
          setMessages(prev => [...prev, { role: 'user', content: msg.content }]);
        }

        if (msg.type === 'delta') {
          streamBuf.current += msg.content;
          const html = parseMarkdown(streamBuf.current);
          setMessages((prev) => prev.map((m, i) =>
            i === prev.length - 1 ? { ...m, content: streamBuf.current, html, streaming: true, status: 'pending' } : m
          ));
        }

        if (msg.type === 'permission_request') {
          setPermTools(msg.tools || []);
        }

        if (msg.type === 'message_result_text') {
          const rid = msg.id;
          const rt = msg.content != null ? String(msg.content) : '';
          setMessages((prev) => {
            let idx = prev.findIndex((m) => m.id != null && rid != null && m.id === rid);
            if (idx < 0) {
              for (let i = prev.length - 1; i >= 0; i--) {
                if (prev[i].role === 'claude') {
                  idx = i;
                  break;
                }
              }
            }
            if (idx < 0) return prev;
            const copy = [...prev];
            copy[idx] = {
              ...copy[idx],
              resultText: rt,
              id: copy[idx].id != null ? copy[idx].id : rid,
            };
            return copy;
          });
        }

        if (msg.type === 'input_mode_changed') {
          setInputMode(msg.value);
          serverInputAppliedRef.current = msg.value;
        }

        if (msg.type === 'shell_command_request') {
          setShellRequest({
            command: msg.command || '',
            line: msg.line || '',
            workDirKey: msg.work_dir_key || '',
          });
        }

        if (msg.type === 'shell_result') {
          setMessages((prev) => {
            const id = msg.id;
            const content = msg.content != null ? String(msg.content) : '';
            let found = false;
            const next = prev.map((m) => {
              if (found) return m;
              if (id != null && m.id === id) {
                found = true;
                return { ...m, role: 'shell', content, html: null, streaming: false, status: 'done' };
              }
              return m;
            });
            if (found) return next;
            for (let i = next.length - 1; i >= 0; i--) {
              if (next[i].role === 'shell' && next[i].status === 'pending') {
                const copy = [...next];
                copy[i] = { ...copy[i], id: id != null ? id : copy[i].id, content, html: null, streaming: false, status: 'done' };
                return copy;
              }
            }
            return [...next, { role: 'shell', id: id != null ? id : null, content, html: null, streaming: false, status: 'done' }];
          });
        }
      };

      ws.onerror = (evt) => {
        console.error('[ws] 連線錯誤', evt);
      };

      ws.onclose = (evt) => {
        console.warn('[ws] 連線關閉', evt.code, evt.reason);
        if (!isCurrent() || wsRef.current !== ws) return;
        reconnectTimerRef.current = setTimeout(() => {
          reconnectTimerRef.current = null;
          connectWS();
        }, 2000);
      };
    };

    init();

    return () => {
      cancelled = true;
      clearReconnectTimer();
      if (wsRef.current && wsRef.current._gen === effectGen) {
        wsRef.current.close();
        wsRef.current = null;
      }
    };
  }, [session.id]);

  const send = useCallback((obj) => {
    const ws = wsRef.current;
    if (!ws || ws.readyState !== 1) return false;
    if (ws._sessionId !== activeSessionRef.current || ws._sessionId !== session.id) return false;
    ws.send(JSON.stringify(obj));
    return true;
  }, [session.id]);

  const flushPendingModes = useCallback(() => {
    const wantPerm = normalizePermMode(agentType, mode);
    const wantInput = inputMode === 'shell' || inputMode === 'agent' ? inputMode : 'agent';
    if (showPermModeSelect && wantPerm !== serverPermAppliedRef.current) {
      if (!send({ type: 'set_mode', mode: wantPerm })) return false;
      serverPermAppliedRef.current = wantPerm;
    }
    if (wantInput !== serverInputAppliedRef.current) {
      if (!send({ type: 'set_input_mode', mode: wantInput })) return false;
      serverInputAppliedRef.current = wantInput;
    }
    return true;
  }, [send, agentType, mode, inputMode, showPermModeSelect]);

  const handleSend = (overrideText) => {
    const raw = overrideText !== undefined && overrideText !== null ? String(overrideText) : input;
    const trimmed = raw.trim();
    if (!trimmed || state !== 'IDLE') return;
    if (trimmed === '/reset' || trimmed === '/clear') {
      if (!flushPendingModes()) return;
      send({ type: 'reset_context' });
      setInput('');
      setSlashMenuItems([]);
      return;
    }
    if (!flushPendingModes()) return;
    const sent = inputMode === 'shell'
      ? send({ type: 'shell_exec', data: trimmed })
      : send({ type: 'input', data: trimmed });
    if (!sent) return;
    setInput('');
    setSlashMenuItems([]);
  };

  const handleSlashSelect = (command) => {
    setInput(command);
    setSlashMenuItems([]);
    handleSend(command);
  };

  const handleKeyDown = (e) => {
    const slashMenuOpen = slashMenuItems.length > 0;
    if (slashMenuOpen) {
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        setSlashActiveIdx((i) => Math.min(i + 1, slashMenuItems.length - 1));
        return;
      }
      if (e.key === 'ArrowUp') {
        e.preventDefault();
        setSlashActiveIdx((i) => Math.max(i - 1, 0));
        return;
      }
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        const item = slashMenuItems[slashActiveIdx];
        if (item) handleSlashSelect(item.command);
        return;
      }
      if (e.key === 'Escape') {
        e.preventDefault();
        setSlashMenuItems([]);
        return;
      }
    }
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      handleSend();
    }
  };

  const handleAllowOnce = () => {
    send({ type: 'allow_once', tools: permTools.map(t => t.tool_name) });
    setPermTools([]);
  };

  const handlePermModeDraftChange = (newMode) => {
    setMode(normalizePermMode(agentType, newMode));
  };

  const handlePermModeCommitNow = (newMode) => {
    const n = normalizePermMode(agentType, newMode);
    setMode(n);
    if (!send({ type: 'set_mode', mode: n })) return;
    serverPermAppliedRef.current = n;
    setPermTools([]);
  };

  const handleInterrupt = () => send({ type: 'interrupt' });

  const isDisabled = state !== 'IDLE';
  const modeSwitchDisabled = state !== 'IDLE';
  const slashMenuOpen = slashMenuItems.length > 0;

  useEffect(() => {
    if (isDisabled) setSlashMenuItems([]);
  }, [isDisabled]);

  useEffect(() => {
    if (!slashMenuOpen) return;
    const onDocMouseDown = (e) => {
      if (slashInputWrapRef.current && !slashInputWrapRef.current.contains(e.target)) {
        setSlashMenuItems([]);
      }
    };
    document.addEventListener('mousedown', onDocMouseDown);
    return () => document.removeEventListener('mousedown', onDocMouseDown);
  }, [slashMenuOpen]);

  useEffect(() => {
    if (!input.startsWith('/')) {
      setSlashMenuItems([]);
      return;
    }
    const q = input.toLowerCase();
    setSlashMenuItems(
      SLASH_COMMANDS.filter(
        (c) => (!c.modes || c.modes.includes(inputMode)) && c.command.toLowerCase().startsWith(q)
      )
    );
    setSlashActiveIdx(0);
  }, [inputMode]);

  const setInputModePersist = (mode) => {
    setInputMode(mode);
    try {
      localStorage.setItem(inputModeStorageKey(session.id), mode);
    } catch (_) {}
  };

  /** 聊天輸入框：依內容伸縮高度，並遵守 CSS max-height（min(40vh,12rem)） */
  useLayoutEffect(() => {
    const el = chatInputRef.current;
    if (!el || state === 'THINKING' || state === 'STREAMING' || state === 'SHELL_EXEC' || state === 'AWAITING_SHELL_CONFIRM') return;
    el.style.height = '0px';
    const maxStr = getComputedStyle(el).maxHeight;
    const maxPx = parseFloat(maxStr);
    const cap = Number.isFinite(maxPx) && maxPx > 0 ? maxPx : 12 * 16;
    el.style.height = `${Math.min(el.scrollHeight, cap)}px`;
  }, [input, state]);

  return (
    <div className={`flex flex-col ${fullHeight ? 'h-app' : 'h-full'}`}>
      <div
        className="flex flex-col gap-1.5 px-4 py-2.5 shrink-0 border-b border-cyan-500/10 bg-slate-950/35 backdrop-blur-md sm:flex-row sm:items-center sm:justify-between sm:gap-3"
        style={{ paddingTop: 'calc(0.5rem + env(safe-area-inset-top) + var(--tg-content-safe-top))' }}
      >
        <div className="flex items-start gap-2 min-w-0 w-full sm:min-w-0 sm:flex-1 sm:items-center">
          {showBack && (
            <button type="button" onClick={onBack}
              className="shrink-0 text-cyan-500/80 hover:text-cyan-300 text-xl leading-none px-1.5 py-1 rounded-xl hover:bg-white/[0.06] mt-0.5 sm:mt-0 transition-colors">
              ←
            </button>
          )}
          <div className="min-w-0 flex-1 space-y-1">
            <div className="nexus-display font-semibold text-base text-transparent bg-clip-text bg-gradient-to-r from-cyan-200 to-teal-200 break-words [overflow-wrap:anywhere] leading-snug">
              {session.name || '未命名'}
            </div>
            <div className="flex flex-wrap items-center gap-x-2 gap-y-1 min-w-0">
              <span className={`inline-flex items-center gap-1 shrink-0 text-[10px] px-1.5 sm:px-2 py-0.5 rounded-full font-mono uppercase ${getAgentBadgeClass(agentType)}`}>
                <AgentBadgeIcon agentType={agentType} />
                {agentType}
              </span>
              <GitBranchBadge branch={session.git_branch} />
              <span
                title={state}
                className={`text-[10px] sm:text-xs px-1.5 sm:px-2 py-0.5 rounded-full font-medium shrink-0 ring-1 ring-white/5 ${
                  state === 'IDLE'            ? 'bg-emerald-950/80 text-emerald-300' :
                  state === 'THINKING'        ? 'bg-cyan-950/80 text-cyan-300' :
                  state === 'STREAMING'       ? 'bg-sky-950/80 text-sky-300' :
                  state === 'SHELL_EXEC'      ? 'bg-fuchsia-950/80 text-fuchsia-200' :
                  state === 'AWAITING_SHELL_CONFIRM' ? 'bg-orange-950/85 text-orange-200' :
                  'bg-amber-950/80 text-amber-200'
                }`}
              >
                {SESSION_STATE_LABEL[state] || state}
              </span>
            </div>
            {session.work_dir && (
              <div className="text-xs text-slate-500 font-mono truncate">{session.work_dir}</div>
            )}
          </div>
        </div>
        {showPermModeSelect && inputMode === 'agent' && (
          <div
            className={
              usePermModeDropdown
                ? 'w-full min-w-0 shrink-0 border-t border-cyan-500/10 pt-2.5 mt-1 -mx-4 px-4 sm:border-t-0 sm:pt-0 sm:mt-0 sm:px-0 sm:mx-0 sm:w-auto sm:max-w-[min(100%,20rem)] sm:self-center'
                : 'w-fit max-w-full min-w-0 shrink-0 self-end sm:self-center sm:ml-auto'
            }
          >
            {usePermModeDropdown ? (
              <div className="flex items-center gap-2 min-w-0 w-full sm:justify-end">
                <span className="shrink-0 text-xs text-slate-500">權限</span>
                <PermModeSelect
                  agentType={agentType}
                  value={mode}
                  onChange={handlePermModeDraftChange}
                  disabled={modeSwitchDisabled}
                  title={
                    agentType === 'gemini'
                      ? 'Gemini 核准模式（--approval-mode）'
                      : agentType === 'cursor'
                      ? '權限模式（bypass：Cursor 會加 --force）'
                      : '權限模式'
                  }
                  id="chat-perm-mode-nexus"
                  className="flex-1 min-w-0 sm:min-w-[11rem]"
                />
              </div>
            ) : (
              <PermModeSwitch
                agentType={agentType}
                value={mode}
                onChange={handlePermModeDraftChange}
                disabled={modeSwitchDisabled}
                title={
                  agentType === 'gemini'
                    ? 'Gemini 核准模式（--approval-mode）'
                    : agentType === 'cursor'
                    ? '權限模式（bypass：Cursor 會加 --force）'
                    : '權限模式'
                }
              />
            )}
          </div>
        )}
      </div>

      {/* 訊息列表 */}
      <div
        ref={chatScrollRef}
        onScroll={syncChatNearBottom}
        className="flex-1 overflow-y-auto app-scroll px-3 sm:px-5 py-5 space-y-4"
      >
        {histLoaded && messages.length === 0 && (
          <div className="text-center text-slate-500 mt-20 text-sm">輸入指令開始對話</div>
        )}
        {messages.map((m, i) => {
          const msgKey = m.id != null ? String(m.id) : `idx-${i}`;
          const forwardBody =
            m.role === 'claude' && String(m.resultText || '').trim() !== ''
              ? m.resultText
              : (m.content || '').trim();
          const canForwardShellOrAgent =
            (m.role === 'claude' || m.role === 'shell') && !m.streaming && !!String(forwardBody || '').trim();
          const showStreamingTail =
            (state === 'THINKING' || state === 'STREAMING') &&
            m.role === 'claude' &&
            i === messages.length - 1;
          const showShellTail =
            state === 'SHELL_EXEC' && m.role === 'shell' && m.streaming && i === messages.length - 1;
          return (
          <div
            key={m.id != null ? `m-${m.id}` : i}
            className={`flex w-full min-w-0 ${m.role === 'user' ? 'justify-end' : 'justify-start'} ${m.role === 'claude' || m.role === 'shell' ? 'group' : ''}`}
          >
            <div
              className={`rounded-2xl px-4 py-3 text-sm w-fit max-w-[88%] min-w-0 ${
                m.role === 'user' ? 'bubble-user' : m.role === 'shell' ? 'bg-slate-900/90 border border-cyan-500/20' : 'bubble-claude'
              }`}
            >
            <div className="flex items-start justify-between gap-2 mb-1.5 min-w-0">
              <div className="text-xs text-slate-500 font-medium min-w-0">
                {m.role === 'user' ? (
                  '你'
                ) : m.role === 'shell' ? (
                  'Shell'
                ) : (
                  <span className="inline-flex items-center gap-1.5">
                    <AgentBadgeIcon agentType={agentType} />
                    <span>{AGENT_LABEL[agentType] || agentType || 'Claude'}</span>
                  </span>
                )}
              </div>
              <div
                className={`shrink-0 flex items-center gap-0.5 -mt-0.5 ${
                  m.role === 'claude' || m.role === 'shell'
                    ? 'opacity-100 pointer-events-auto sm:opacity-0 sm:pointer-events-none sm:group-hover:opacity-100 sm:group-hover:pointer-events-auto transition-opacity duration-150'
                    : ''
                }`}
              >
                <MessageCopyButton
                  text={m.role === 'claude' || m.role === 'shell' ? forwardBody : (m.content || '').trim()}
                  className="p-1 rounded-md text-slate-500 hover:text-slate-200 hover:bg-slate-800/80 disabled:opacity-30 disabled:pointer-events-none"
                />
                {m.role === 'claude' || m.role === 'shell' ? (
                  <button
                    type="button"
                    onClick={(e) => {
                      e.stopPropagation();
                      setForwardModal({ messageKey: msgKey, messageContent: forwardBody });
                    }}
                    disabled={!canForwardShellOrAgent}
                    title="轉發到其他會話"
                    className="inline-flex items-center gap-0.5 px-1 py-0.5 rounded-md text-slate-400 hover:text-cyan-400 disabled:opacity-30 disabled:pointer-events-none"
                  >
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-3.5 h-3.5" aria-hidden>
                      <path d="M15 14v5l6-6-6-6v5H3v2z" />
                    </svg>
                    <span className="text-[10px] font-medium leading-none">Forward</span>
                  </button>
                ) : null}
              </div>
            </div>
            {m.role === 'claude' ? (
              (m.html || showStreamingTail) ? (
                <div className="flex flex-row items-end gap-1">
                  {m.html && (
                    <div className="prose text-slate-100 text-sm flex-1 min-w-0" dangerouslySetInnerHTML={{ __html: m.html }} />
                  )}
                  {showStreamingTail && (
                    <span className="streaming-tail shrink-0 select-none" aria-hidden="true">...</span>
                  )}
                </div>
              ) : (
                <><span className="dot"/><span className="dot"/><span className="dot"/></>
              )
            ) : m.role === 'shell' ? (
              <div className="flex flex-row items-end gap-1 font-mono text-xs text-slate-100 min-w-0">
                <div className="whitespace-pre-wrap break-words flex-1 min-w-0">
                  {(m.content || '').trim() === '' && m.status === 'done' && !showShellTail
                    ? '（無輸出）'
                    : m.content}
                  {showShellTail && (
                    <span className="streaming-tail shrink-0 select-none text-fuchsia-300" aria-hidden="true">...</span>
                  )}
                </div>
              </div>
            ) : (
              <div className="whitespace-pre-wrap text-slate-100 break-words">{m.content}</div>
            )}
            {(m.role === 'claude' || m.role === 'shell') && forwardHints[msgKey] ? (
              <div className="mt-2 pt-2 border-t border-slate-600/40 text-[11px] text-slate-400">
                已 Forward 到「{forwardHints[msgKey].label}」
                <button
                  type="button"
                  className="ml-1 text-cyan-400 hover:text-cyan-300 font-medium"
                  onClick={() => jumpToSession(forwardHints[msgKey].session)}
                >
                  前往查看 →
                </button>
              </div>
            ) : null}
            </div>
          </div>
          );
        })}

        {/* 授權確認 */}
        {state === 'AWAITING_CONFIRM' && permTools.length > 0 && (
          <div className="rounded-2xl border border-amber-500/35 bg-gradient-to-br from-amber-950/55 to-slate-950/80 px-4 py-4 text-sm mr-4 shadow-xl shadow-amber-950/30">
            <div className="text-amber-300 font-semibold mb-2 nexus-display">需要授權</div>
            {permTools.map((t, i) => (
              <div key={i} className="text-slate-300 text-xs font-mono mb-1">
                {t.tool_name}
                {t.tool_input && (
                  <span className="text-slate-500"> — {JSON.stringify(t.tool_input).slice(0, 80)}</span>
                )}
              </div>
            ))}
            <div className="flex flex-wrap gap-2 mt-4">
              <button onClick={handleAllowOnce}
                className="px-4 py-2 bg-amber-600/90 hover:bg-amber-500 text-white rounded-xl text-xs font-semibold shadow-md">
                允許此操作
              </button>
              <button onClick={() => handlePermModeCommitNow('acceptEdits')}
                className="px-4 py-2 bg-teal-700/90 hover:bg-teal-600 text-white rounded-xl text-xs font-semibold">
                允許並記住
              </button>
            </div>
          </div>
        )}

        {state === 'AWAITING_SHELL_CONFIRM' && shellRequest && (
          <div className="rounded-2xl border border-orange-600/50 bg-gradient-to-br from-orange-950/55 to-slate-950/85 px-4 py-4 text-sm mr-4 shadow-xl">
            <div className="text-orange-300 font-semibold mb-2 nexus-display">允許執行 Shell 指令？</div>
            <div className="text-slate-200 text-xs font-mono break-words mb-1 whitespace-pre-wrap">{shellRequest.line}</div>
            <div className="text-slate-500 text-[10px] font-mono mb-2">
              指令名稱：<span className="text-orange-200/90">{shellRequest.command}</span>
              {shellRequest.workDirKey ? (
                <span className="block truncate mt-0.5" title={shellRequest.workDirKey}>目錄：{shellRequest.workDirKey}</span>
              ) : null}
            </div>
            <div className="flex flex-wrap gap-2 mt-3">
              <button type="button" onClick={() => { send({ type: 'shell_allow_once' }); }}
                className="px-4 py-2 bg-orange-700/90 hover:bg-orange-600 text-white rounded-xl text-xs font-semibold">
                允許一次
              </button>
              <button type="button" onClick={() => { send({ type: 'shell_allow_remember_workdir' }); }}
                className="px-4 py-2 bg-amber-900/90 hover:bg-amber-800 text-amber-100 rounded-xl text-xs font-semibold">
                允許並記住此目錄
              </button>
              <button type="button" onClick={() => { send({ type: 'shell_deny' }); }}
                className="px-4 py-2 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-xl text-xs font-semibold">
                拒絕
              </button>
            </div>
          </div>
        )}

        <div ref={bottomRef} />
      </div>

      <div
        className="shrink-0 px-3 sm:px-4 py-3 border-t border-cyan-500/10 bg-slate-950/60 backdrop-blur-xl"
        style={{ paddingBottom: 'calc(0.75rem + env(safe-area-inset-bottom))' }}
      >
        {state === 'STREAMING' || state === 'THINKING' || state === 'SHELL_EXEC' ? (
          <button onClick={handleInterrupt}
            className="w-full py-3 bg-red-950/70 hover:bg-red-900/80 text-red-200 rounded-2xl text-sm font-semibold border border-red-500/25">
            中斷
          </button>
        ) : (
          <div className="flex flex-col gap-1.5 w-full min-w-0">
            <div className="flex w-full min-w-0 gap-2.5 items-center">
            <button
              type="button"
              onClick={() => setInputModePersist(inputMode === 'shell' ? 'agent' : 'shell')}
              disabled={isDisabled}
              title={inputMode === 'shell' ? '切換為 Agent 模式' : '切換為 Shell 模式'}
              aria-label={inputMode === 'shell' ? '切換為 Agent 模式' : '切換為 Shell 模式'}
              aria-pressed={inputMode === 'shell'}
              className={`shrink-0 flex items-center justify-center w-12 h-12 rounded-2xl border transition-all focus:outline-none focus-visible:ring-2 focus-visible:ring-cyan-500 focus-visible:ring-offset-2 focus-visible:ring-offset-slate-950 disabled:opacity-40 ${
                inputMode === 'shell'
                  ? 'border-orange-500/55 bg-orange-950/35 text-orange-400 hover:bg-orange-950/50'
                  : 'border-cyan-500/20 bg-slate-900/80 text-cyan-400/90 hover:bg-slate-800/90'
              }`}
            >
              {inputMode === 'shell' ? (
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={1.5} stroke="currentColor" className="w-5 h-5" aria-hidden>
                  <path strokeLinecap="round" strokeLinejoin="round" d="M6.75 7.5l3 2.25-3 2.25m4.5-4.5h7.5m-15 8.25h13.5A2.25 2.25 0 0021 12V5.25A2.25 2.25 0 0018.75 3H5.25A2.25 2.25 0 003 5.25v12A2.25 2.25 0 005.25 19.5z" />
                </svg>
              ) : (
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={1.5} stroke="currentColor" className="w-5 h-5" aria-hidden>
                  <path strokeLinecap="round" strokeLinejoin="round" d="M8.625 12a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0H8.25m4.5 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0H12m4.5 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0h-.375M21 12c0 4.556-4.03 8.25-9 8.25a9.764 9.764 0 01-2.555-.337A5.972 5.972 0 015.41 20.97a5.969 5.969 0 01-.474-.065 4.48 4.48 0 00.978-2.025c.09-.457-.133-.901-.467-1.226C3.93 16.178 3 14.189 3 12c0-4.556 4.03-8.25 9-8.25s9 3.694 9 8.25z" />
                </svg>
              )}
            </button>
            <div className="relative flex min-h-12 flex-1 min-w-0 items-center" ref={slashInputWrapRef}>
              {slashMenuOpen && (
                <SlashCommandMenu
                  items={slashMenuItems}
                  activeIndex={slashActiveIdx}
                  onSelect={handleSlashSelect}
                />
              )}
              <textarea
                ref={chatInputRef}
                value={input}
                onChange={(e) => {
                  const value = e.target.value;
                  setInput(value);
                  if (value.startsWith('/')) {
                    const q = value.toLowerCase();
                    setSlashMenuItems(
                      SLASH_COMMANDS.filter(
                        (c) =>
                          (!c.modes || c.modes.includes(inputMode)) &&
                          c.command.toLowerCase().startsWith(q)
                      )
                    );
                    setSlashActiveIdx(0);
                  } else {
                    setSlashMenuItems([]);
                  }
                }}
                onKeyDown={handleKeyDown}
                disabled={isDisabled}
                placeholder={
                  inputMode === 'shell'
                    ? '輸入指令，例如 git status（左側圖示切回 Agent）'
                    : '輸入與 Agent 對話…（左側圖示切到 Shell）'
                }
                rows={1}
                className="flex-1 min-w-0 w-full resize-none overflow-y-auto app-scroll bg-slate-900/75 border border-cyan-500/15 rounded-2xl px-4 py-3 text-sm leading-relaxed text-slate-100 placeholder-slate-500 focus:outline-none focus:border-cyan-400/45 focus:ring-1 focus:ring-cyan-500/20 disabled:opacity-40 min-h-12 max-h-[min(40vh,12rem)] box-border shadow-inner shadow-black/20"
              />
            </div>
            <button type="button" onClick={() => handleSend()} disabled={isDisabled || !input.trim()}
              aria-label="送出"
              title="送出（Enter）"
              className="shrink-0 flex items-center justify-center w-12 h-12 rounded-2xl bg-gradient-to-br from-cyan-500 to-teal-600 hover:brightness-110 disabled:opacity-30 text-slate-950 shadow-lg shadow-cyan-950/40 transition-all"
            >
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" className="w-5 h-5" aria-hidden>
                <path d="M3.478 2.405a.75.75 0 0 0-.926.94l2.432 7.905H13.5a.75.75 0 0 1 0 1.5H4.984l-2.432 7.905a.75.75 0 0 0 .926.94 60.519 60.519 0 0 0 18.445-8.986.75.75 0 0 0 0-1.218A60.517 60.517 0 0 0 3.478 2.405Z" />
              </svg>
            </button>
            </div>
          </div>
        )}
      </div>

      <ForwardModal
        payload={forwardModal}
        onClose={() => setForwardModal(null)}
        currentSessionId={session.id}
        allSessions={allSessions}
        usePermModeDropdown={usePermModeDropdown}
        onForwarded={({ messageKey, targetSession, jump }) => {
          setForwardHints((prev) => ({
            ...prev,
            [messageKey]: {
              label: `${targetSession.agent_type || 'claude'} / ${workDirGroupShortLabel(targetSession.work_dir)}`,
              session: targetSession,
            },
          }));
          if (jump) jumpToSession(targetSession);
        }}
      />
    </div>
  );
}

// ── 密碼輸入畫面（非 TMA 環境）────────────────────────────────────────────────
function PasswordView({ onSuccess }) {
  const [pwd, setPwd]     = useState('');
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);

  const submit = async () => {
    if (!pwd.trim()) return;
    setLoading(true);
    setError('');
    const res = await fetch(resolveApiUrl('/auth/login'), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pwd }),
    });
    setLoading(false);
    if (res.ok) {
      const data = await res.json().catch(() => ({}));
      if (data.token) {
        try {
          localStorage.setItem(WEB_SESSION_STORAGE_KEY, data.token);
        } catch (_) {}
      }
      onSuccess();
    } else {
      const data = await res.json().catch(() => ({}));
      setError(data.error || '密碼錯誤，請重試');
    }
  };

  const handleKey = (e) => {
    if (e.key === 'Enter') submit();
  };

  return (
    <div className="flex items-center justify-center min-h-full px-4">
      <div className="w-full max-w-sm space-y-5 rounded-3xl border border-cyan-500/15 bg-slate-950/60 backdrop-blur-xl p-8 shadow-2xl shadow-cyan-950/20">
        <div className="text-center space-y-1">
          <div className="nexus-display text-2xl font-bold bg-gradient-to-r from-cyan-200 to-teal-300 bg-clip-text text-transparent">Claude Code</div>
          <div className="text-[10px] uppercase tracking-[0.2em] text-cyan-500/60">Nexus</div>
          <div className="text-slate-500 text-sm pt-2">請輸入存取密碼</div>
        </div>
        <input
          type="password"
          value={pwd}
          onChange={e => setPwd(e.target.value)}
          onKeyDown={handleKey}
          placeholder="密碼"
          autoFocus
          className="w-full bg-slate-900/70 border border-cyan-500/20 rounded-xl px-4 py-3 text-sm text-slate-100 placeholder-slate-500 focus:outline-none focus:border-cyan-400/50 focus:ring-1 focus:ring-cyan-500/20"
        />
        {error && <div className="text-red-400 text-xs text-center">{error}</div>}
        <button onClick={submit} disabled={loading || !pwd.trim()}
          className="w-full py-3 rounded-xl text-sm font-semibold bg-gradient-to-r from-cyan-500 to-teal-600 text-slate-950 hover:brightness-110 disabled:opacity-40 shadow-lg shadow-cyan-950/30">
          {loading ? '驗證中…' : '進入'}
        </button>
      </div>
    </div>
  );
}

// ── Debug Banner（開發用，上線前移除）────────────────────────────────────────
const DEBUG_BANNER = false;
function DebugBanner() {
  if (!DEBUG_BANNER) return null;
  return (
    <div style={{position:'fixed',top:0,left:0,right:0,background:'#1a1a00',color:'#ffff00',fontSize:'10px',padding:'4px 8px',zIndex:9999,wordBreak:'break-all'}}>
      isTMA={String(isTMA)} | TG={String(isTelegram)} | initData={initData ? initData.slice(0,40)+'…' : '(empty)'}
    </div>
  );
}

// ── Root ──────────────────────────────────────────────────────────────────────
function App() {
  const [session, setSession] = useState(null);
  const [authed, setAuthed]   = useState(isTelegram);
  const [isWideScreen, setIsWideScreen] = useState(() => window.matchMedia('(min-width: 1024px)').matches);
  // 非 TMA 環境：mount 時試探 cookie 是否仍有效
  const [checking, setChecking] = useState(!isTelegram);

  const [sidebarWidthPx, setSidebarWidthPx] = useState(() =>
    typeof window !== 'undefined' ? clampSidebarWidthPx(readStoredSidebarWidthPx()) : SIDEBAR_WIDTH_DEFAULT
  );
  const lastSidebarWidthRef = useRef(sidebarWidthPx);

  useEffect(() => {
    lastSidebarWidthRef.current = sidebarWidthPx;
  }, [sidebarWidthPx]);

  useEffect(() => {
    const onResize = () => {
      setSidebarWidthPx((w) => clampSidebarWidthPx(w));
    };
    window.addEventListener('resize', onResize);
    return () => window.removeEventListener('resize', onResize);
  }, []);

  const handleSidebarResizeStart = useCallback((e) => {
    if (e.button !== undefined && e.button !== 0) return;
    e.preventDefault();
    const getX = (ev) => {
      if (ev.touches && ev.touches.length) return ev.touches[0].clientX;
      return ev.clientX;
    };
    const startX = getX(e);
    const startW = lastSidebarWidthRef.current;

    const onMove = (ev) => {
      ev.preventDefault();
      const x = getX(ev);
      const next = clampSidebarWidthPx(startW + (x - startX));
      setSidebarWidthPx(next);
      lastSidebarWidthRef.current = next;
    };

    const onUp = () => {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
      document.removeEventListener('touchmove', onMove);
      document.removeEventListener('touchend', onUp);
      document.removeEventListener('touchcancel', onUp);
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
      try {
        localStorage.setItem(SIDEBAR_WIDTH_STORAGE_KEY, String(lastSidebarWidthRef.current));
      } catch (_) {}
    };

    if (e.type === 'touchstart') {
      document.addEventListener('touchmove', onMove, { passive: false });
      document.addEventListener('touchend', onUp);
      document.addEventListener('touchcancel', onUp);
    } else {
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
      document.body.style.cursor = 'col-resize';
      document.body.style.userSelect = 'none';
    }
  }, []);

  const [sidebarSortedSessions, setSidebarSortedSessions] = useState([]);

  /** 側欄輪詢 /sessions 時同步目前聊天室 Session 的 git_branch、work_dir */
  const mergeSessionMetaFromList = useCallback((list) => {
    if (!Array.isArray(list)) return;
    setSession((prev) => {
      if (!prev) return null;
      const row = list.find((s) => s.id === prev.id);
      if (!row) return prev;
      if (row.git_branch === prev.git_branch && row.work_dir === prev.work_dir) return prev;
      return { ...prev, git_branch: row.git_branch, work_dir: row.work_dir };
    });
  }, []);

  useEffect(() => {
    if (isTelegram) return;
    apiFetch('/sessions').then((res) => {
      if (res.ok) setAuthed(true);
      else if (res.status === 401) {
        try {
          localStorage.removeItem(WEB_SESSION_STORAGE_KEY);
        } catch (_) {}
      }
    }).finally(() => setChecking(false));
  }, []);

  useEffect(() => {
    const media = window.matchMedia('(min-width: 1024px)');
    const handleChange = (e) => setIsWideScreen(e.matches);
    setIsWideScreen(media.matches);
    if (media.addEventListener) {
      media.addEventListener('change', handleChange);
    } else {
      media.addListener(handleChange);
    }
    return () => {
      if (media.removeEventListener) {
        media.removeEventListener('change', handleChange);
      } else {
        media.removeListener(handleChange);
      }
    };
  }, []);

  if (checking) {
    return (
      <div className="flex items-center justify-center h-app">
        <div className="flex items-center gap-2 text-cyan-400/80 text-sm font-medium">
          <span className="inline-flex h-2 w-2 rounded-full bg-cyan-400 animate-pulse" />
          載入中…
        </div>
      </div>
    );
  }

  const renderAuthedLayout = () => {
    if (!isWideScreen) {
      return session
        ? <ChatView session={session} onBack={() => setSession(null)} usePermModeDropdown onJumpToSession={setSession} allSessions={sidebarSortedSessions} />
        : <SessionView onEnter={setSession} onSessionsLoaded={mergeSessionMetaFromList} onSortedSessionsChange={setSidebarSortedSessions} usePermModeDropdown />;
    }

    return (
      <div className="h-app flex bg-[#05080f] min-w-0">
        <aside
          style={{ width: sidebarWidthPx, flexShrink: 0 }}
          className="min-w-0 flex flex-col border-r border-cyan-500/10 bg-slate-950/50 backdrop-blur-sm"
        >
          <SessionView onEnter={setSession} onSessionsLoaded={mergeSessionMetaFromList} onSortedSessionsChange={setSidebarSortedSessions} />
        </aside>
        <div
          role="separator"
          aria-orientation="vertical"
          aria-valuenow={sidebarWidthPx}
          aria-valuemin={SIDEBAR_WIDTH_MIN}
          aria-valuemax={sidebarWidthMaxPx()}
          title="拖曳調整側欄寬度"
          className="group relative w-3 shrink-0 cursor-col-resize select-none touch-none bg-slate-950 hover:bg-slate-900/80"
          onMouseDown={handleSidebarResizeStart}
          onTouchStart={handleSidebarResizeStart}
        >
          <span
            className="pointer-events-none absolute left-1/2 top-0 bottom-0 w-px -translate-x-1/2 bg-cyan-500/15 group-hover:bg-cyan-400/40"
            aria-hidden
          />
        </div>
        <main className="flex-1 min-w-0 min-h-0 bg-[#060a12]/90">
          {session ? (
            <ChatView session={session} onBack={() => setSession(null)} showBack={false} fullHeight={false} onJumpToSession={setSession} allSessions={sidebarSortedSessions} />
          ) : (
            <div className="h-full flex flex-col items-center justify-center gap-3 text-slate-500 text-sm px-6">
              <div className="nexus-display text-lg font-semibold text-slate-400">選擇 Session</div>
              <p className="text-center text-xs text-slate-600 max-w-xs">從左側列表點選一段對話即可在此開始</p>
            </div>
          )}
        </main>
      </div>
    );
  };

  return (
    <>
      <DebugBanner />
      {!authed
        ? <PasswordView onSuccess={() => setAuthed(true)} />
        : renderAuthedLayout()
      }
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

<div id="root" class="h-app"></div>
</body>
