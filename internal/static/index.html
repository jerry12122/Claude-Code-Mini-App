<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
  <title>Claude Code TMA</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" />
  <style>
    :root { --tg-content-safe-top: 0px; }
    body { background: #0f0f0f; color: #e5e5e5; font-family: system-ui, sans-serif; }
    input, textarea, select { font-size: 16px !important; }
    .prose pre { margin: 0; overflow-x: auto; -webkit-overflow-scrolling: touch; max-width: 100%; }
    .prose pre code { white-space: pre; }
    .prose code:not(pre code) {
      background: #2a2a2a; padding: 0.1em 0.4em; border-radius: 4px; font-size: 0.9em;
    }
    .prose p { margin: 0.5em 0; }
    .prose ul, .prose ol { padding-left: 1.5em; margin: 0.5em 0; }
    .prose h1,.prose h2,.prose h3 { font-weight: 600; margin: 0.75em 0 0.25em; }
    .prose table { border-collapse: collapse; min-width: 100%; }
    .prose table th, .prose table td { border: 1px solid #3a3a5a; padding: 0.3em 0.75em; white-space: nowrap; }
    .prose table th { background: #2a2a4a; font-weight: 600; }
    .prose .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; margin: 0.5em 0; }
    .bubble-claude { background: #1a1a2e; border: 1px solid #2a2a4a; overflow: hidden; min-width: 0; }
    .bubble-user   { background: #1a2e1a; border: 1px solid #2a4a2a; overflow: hidden; min-width: 0; }
    @keyframes streaming-dots {
      0%, 100% { opacity: 0.35; }
      50% { opacity: 1; }
    }
    .streaming-tail {
      display: inline-block;
      margin-left: 0.1em;
      letter-spacing: 0.02em;
      color: #a5b4fc;
      animation: streaming-dots 1s ease-in-out infinite;
    }
    @keyframes pulse-dot {
      0%, 80%, 100% { opacity: 0.2; } 40% { opacity: 1; }
    }
    .dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: #6366f1; margin: 0 2px; animation: pulse-dot 1.2s infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    /* 側欄 Session 列表與聊天室共用：細捲軸、與標題 indigo 一致 */
    .app-scroll {
      -webkit-overflow-scrolling: touch;
      scrollbar-width: thin;
      scrollbar-color: rgba(99, 102, 241, 0.48) rgba(24, 24, 27, 0.65);
      overscroll-behavior-y: contain;
    }
    .app-scroll::-webkit-scrollbar {
      width: 5px;
    }
    .app-scroll::-webkit-scrollbar-track {
      background: rgba(15, 15, 15, 0.45);
      border-radius: 4px;
    }
    .app-scroll::-webkit-scrollbar-thumb {
      background: rgba(99, 102, 241, 0.42);
      border-radius: 4px;
      border: 1px solid rgba(15, 15, 15, 0.35);
    }
    .app-scroll::-webkit-scrollbar-thumb:hover {
      background: rgba(129, 140, 248, 0.58);
    }
  </style>
</head>
<body class="h-screen">

<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

// ── Telegram WebApp 初始化 ────────────────────────────────────────────────────
const tgApp = window.Telegram?.WebApp;
// 判斷是否在 Telegram WebView 裡（即使 initData 暫時為空也算）
const isTMA = !!(tgApp);
const initData = isTMA ? (tgApp.initData || '') : '';
// 有 initData 才走 TG 驗證，否則 fallback 到密碼驗證
const isTelegram = isTMA && initData !== '';

if (isTMA) {
  tgApp.ready();
  tgApp.expand();
  tgApp.disableVerticalSwipes?.();
  const updateContentSafeArea = () => {
    const top = tgApp.contentSafeAreaInset?.top ?? 0;
    document.documentElement.style.setProperty('--tg-content-safe-top', `${top}px`);
  };
  updateContentSafeArea();
  tgApp.onEvent('contentSafeAreaChanged', updateContentSafeArea);
}

console.log('[init] isTMA:', isTMA, 'isTelegram:', isTelegram, 'initData len:', initData.length, 'protocol:', location.protocol);

// 統一 fetch：TMA 帶 initData，Web 模式 cookie 由瀏覽器自動帶入
const apiFetch = (url, opts = {}) => {
  const headers = { ...(opts.headers || {}) };
  if (isTelegram) {
    headers['X-Telegram-Init-Data'] = initData;
  }
  return fetch(url, { ...opts, headers });
};

// WebSocket URL（自動依 http/https 選 ws/wss）
// Web 模式：WebSocket 同源請求會自動帶 cookie，無需額外參數
const wsURL = (sessionId) => {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  const base = `${proto}://${location.host}/sessions/${sessionId}/ws`;
  if (isTelegram) return `${base}?initData=${encodeURIComponent(initData)}`;
  return base;
};

marked.setOptions({
  highlight: (code, lang) => {
    if (lang && hljs.getLanguage(lang)) return hljs.highlight(code, { language: lang }).value;
    return hljs.highlightAuto(code).value;
  },
  breaks: true,
});

const parseMarkdown = (text) => {
  const html = marked.parse(text);
  return html
    .replace(/<table>/g, '<div class="table-wrap"><table>')
    .replace(/<\/table>/g, '</table></div>');
};

/** 顯示用：permission_mode 值 → 中文標籤。包含 Claude/Cursor 與 Gemini 兩套值。 */
const PERM_MODE_LABEL = {
  default: '預設',
  acceptEdits: '自動編輯',
  bypassPermissions: '⚠️ 跳過授權',
  auto_edit: '自動編輯',
  yolo: '⚠️ YOLO（全自動）',
  plan: '規劃模式',
};

const AGENT_LABEL = { claude: 'Claude', cursor: 'Cursor', codex: 'Codex', gemini: 'Gemini' };

/**
 * 依 agent_type 回傳可用的 permission_mode 下拉選項。
 * - Claude / Cursor: default / acceptEdits / bypassPermissions
 * - Gemini: default / auto_edit / plan / yolo（對應 CLI --approval-mode）
 * - Codex: 暫不支援
 * 所有值共用 DB 欄位 `permission_mode`，後端各 runner 自行解釋。
 */
function permModeOptionsFor(agentType) {
  const t = String(agentType || 'claude').toLowerCase();
  if (t === 'gemini') {
    return [
      { value: 'default', label: '預設' },
      { value: 'auto_edit', label: '自動編輯' },
      { value: 'plan', label: '規劃模式' },
      { value: 'yolo', label: 'YOLO（全自動）⚠️' },
    ];
  }
  return [
    { value: 'default', label: '預設' },
    { value: 'acceptEdits', label: '自動編輯' },
    { value: 'bypassPermissions', label: '跳過授權 ⚠️' },
  ];
}

/** 切換 agent_type 時，若舊的 mode 在新 agent 下不合法，退回 default。 */
function normalizePermMode(agentType, mode) {
  const valid = permModeOptionsFor(agentType).map((o) => o.value);
  return valid.includes(mode) ? mode : 'default';
}

/** 依 CLI runner（agent_type）回傳 badge 的 Tailwind 底色／文字色 */
function getAgentBadgeClass(agentType) {
  const t = String(agentType || 'claude').toLowerCase();
  const map = {
    claude: 'bg-orange-900/60 text-orange-200',
    cursor: 'bg-emerald-900/60 text-emerald-300',
    codex: 'bg-green-900/60 text-green-300',
    gemini: 'bg-sky-900/60 text-sky-300',
  };
  return map[t] || 'bg-gray-700/60 text-gray-300';
}

/**
 * 廠商圖示：Simple Icons CDN（https://cdn.simpleicons.org/{slug}/{hex}）
 * slug 見 https://simpleicons.org/ ；色碼與 badge 文字色對齊（無 #）
 */
const AGENT_BADGE_ICON_CDN = {
  claude: { slug: 'claude', color: 'fed7aa' },
  cursor: { slug: 'cursor', color: '6ee7b7' },
  codex: { slug: 'openai', color: '86efac' },
  gemini: { slug: 'googlegemini', color: '7dd3fc' },
};

function AgentBadgeIcon({ agentType }) {
  const t = String(agentType || 'claude').toLowerCase();
  const cfg = AGENT_BADGE_ICON_CDN[t] || { slug: 'anthropic', color: 'd1d5db' };
  const src = `https://cdn.simpleicons.org/${cfg.slug}/${cfg.color}`;
  return (
    <img
      src={src}
      alt=""
      width={14}
      height={14}
      loading="lazy"
      decoding="async"
      referrerPolicy="no-referrer"
      className="w-3.5 h-3.5 shrink-0 opacity-95 object-contain [content-visibility:auto]"
      onError={(e) => {
        e.currentTarget.removeAttribute('src');
        e.currentTarget.style.display = 'none';
      }}
    />
  );
}

/** 解析 API 回傳的 last_active（SQLite datetime 字串）為毫秒時間戳 */
function sessionLastActiveMs(s) {
  if (!s || !s.last_active) return 0;
  const raw = String(s.last_active).trim();
  const t = Date.parse(raw.includes('T') ? raw : raw.replace(' ', 'T'));
  return Number.isNaN(t) ? 0 : t;
}

/** 將 API / sync 的訊息列轉成 ChatView 用的物件（含 pending 串流） */
function mapMessageRow(m) {
  const role = m.role;
  const status = m.status || 'done';
  const pending = status === 'pending';
  const content = m.content || '';
  return {
    id: m.id,
    role,
    content,
    status,
    html: role === 'claude' ? (content ? parseMarkdown(content) : null) : null,
    streaming: pending,
  };
}

// ── Session 列表畫面 ──────────────────────────────────────────────────────────
function SessionView({ onEnter }) {
  const [sessions, setSessions]   = useState([]);
  const [sessionSearch, setSessionSearch] = useState('');
  const [sessionSort, setSessionSort]     = useState('last_active_desc');
  const [showForm, setShowForm]   = useState(false);
  const [newName, setNewName]     = useState('');
  const [newDir, setNewDir]       = useState('');
  const [newMode, setNewMode]     = useState('default');
  const [newAgent, setNewAgent]   = useState('claude');
  const [loading, setLoading]     = useState(false);
  const [renamingId, setRenamingId] = useState(null);
  const [renameVal, setRenameVal]   = useState('');
  const renameInputRef = useRef(null);

  const load = async () => {
    try {
      const res = await apiFetch('/sessions');
      if (!res.ok) {
        console.warn('[sessions] load failed', res.status);
        return;
      }
      const data = await res.json();
      if (Array.isArray(data)) {
        setSessions(data);
      } else {
        console.warn('[sessions] unexpected payload', data);
      }
    } catch (err) {
      console.warn('[sessions] load error', err);
    }
  };

  useEffect(() => { load(); }, []);

  useEffect(() => {
    const id = setInterval(() => { load(); }, 5000);
    return () => clearInterval(id);
  }, []);

  useEffect(() => {
    if (renamingId) renameInputRef.current?.focus();
  }, [renamingId]);

  const create = async () => {
    if (!newName.trim()) return;
    setLoading(true);
    await apiFetch('/sessions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        name: newName.trim(),
        work_dir: newDir.trim(),
        permission_mode: newMode,
        agent_type: newAgent,
      }),
    });
    setNewName(''); setNewDir(''); setNewMode('default'); setNewAgent('claude');
    setShowForm(false);
    setLoading(false);
    load();
  };

  const del = async (id, e) => {
    e.stopPropagation();
    if (!confirm('確定刪除此 Session 及所有對話紀錄？')) return;
    await apiFetch(`/sessions/${id}`, { method: 'DELETE' });
    load();
  };

  const startRename = (s, e) => {
    e.stopPropagation();
    setRenamingId(s.id);
    setRenameVal(s.name || '');
  };

  const commitRename = async (id) => {
    const trimmed = renameVal.trim();
    if (trimmed) {
      await apiFetch(`/sessions/${id}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: trimmed }),
      });
      await load();
    }
    setRenamingId(null);
    setRenameVal('');
  };

  const handleRenameKey = (e, id) => {
    if (e.key === 'Enter') { e.preventDefault(); commitRename(id); }
    if (e.key === 'Escape') { setRenamingId(null); setRenameVal(''); }
  };

  const sortOptions = [
    { value: 'last_active_desc', label: '活動 新→舊' },
    { value: 'last_active_asc', label: '活動 舊→新' },
    { value: 'name_asc', label: '名稱 A→Z' },
    { value: 'name_desc', label: '名稱 Z→A' },
    { value: 'agent_asc', label: 'Runner' },
  ];

  const displaySessions = useMemo(() => {
    const q = sessionSearch.trim().toLowerCase();
    let list = Array.isArray(sessions) ? sessions : [];
    if (q) {
      list = list.filter((s) => {
        const parts = [
          s.name,
          s.work_dir,
          s.description,
          s.agent_type,
          s.agent_session_id,
          s.id,
        ]
          .filter(Boolean)
          .join(' ')
          .toLowerCase();
        return parts.includes(q);
      });
    }
    const out = [...list];
    const cmpName = (a, b) => (a.name || '').localeCompare(b.name || '', 'zh-Hant');
    const cmpAgent = (a, b) => (a.agent_type || '').localeCompare(b.agent_type || '');
    out.sort((a, b) => {
      switch (sessionSort) {
        case 'last_active_asc':
          return sessionLastActiveMs(a) - sessionLastActiveMs(b);
        case 'last_active_desc':
          return sessionLastActiveMs(b) - sessionLastActiveMs(a);
        case 'name_asc':
          return cmpName(a, b);
        case 'name_desc':
          return cmpName(b, a);
        case 'agent_asc':
          return cmpAgent(a, b) || cmpName(a, b);
        default:
          return 0;
      }
    });
    return out;
  }, [sessions, sessionSearch, sessionSort]);

  return (
    <div className="flex flex-col h-screen min-w-0 overflow-hidden">
      {/* Header */}
      <div className="flex items-center justify-between px-4 py-3 bg-gray-900 border-b border-gray-800 shrink-0"
           style={{ paddingTop: 'calc(0.75rem + env(safe-area-inset-top) + var(--tg-content-safe-top))' }}>
        <span className="font-semibold text-indigo-400 text-base">Claude Code</span>
        <button onClick={() => setShowForm(!showForm)}
          className="px-3 py-1.5 bg-indigo-600 hover:bg-indigo-500 text-white rounded-lg text-sm font-medium">
          + 新 Session
        </button>
      </div>

      {/* 搜尋／排序（有 Session 時顯示） */}
      {sessions.length > 0 && (
        <div className="px-3 py-2 bg-gray-900/80 border-b border-gray-800 shrink-0 flex flex-col gap-2 min-w-0">
          <input
            type="search"
            value={sessionSearch}
            onChange={(e) => setSessionSearch(e.target.value)}
            placeholder="搜尋名稱、目錄、Runner…"
            autoComplete="off"
            className="w-full min-w-0 bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm text-gray-200 placeholder-gray-500 focus:outline-none focus:border-indigo-600"
          />
          <div className="min-w-0">
            <div className="text-xs text-gray-500 mb-1.5">排序方式</div>
            <div
              className="flex flex-wrap gap-1.5"
              role="group"
              aria-label="排序方式"
            >
              {sortOptions.map((opt) => {
                const active = sessionSort === opt.value;
                return (
                  <button
                    key={opt.value}
                    type="button"
                    onClick={() => setSessionSort(opt.value)}
                    aria-pressed={active}
                    title={opt.label}
                    className={
                      'px-2.5 py-1.5 rounded-lg text-xs font-medium border transition-colors shrink-0 ' +
                      (active
                        ? 'bg-indigo-600 border-indigo-500 text-white shadow-sm'
                        : 'bg-gray-800/80 border-gray-700 text-gray-400 hover:border-gray-600 hover:text-gray-300')
                    }
                  >
                    {opt.label}
                  </button>
                );
              })}
            </div>
          </div>
        </div>
      )}

      {/* 建立表單 */}
      {showForm && (
        <div className="px-4 py-3 bg-gray-900 border-b border-gray-700 space-y-2 shrink-0 min-w-0">
          <input value={newName} onChange={e => setNewName(e.target.value)}
            placeholder="Session 名稱（必填）"
            className="w-full min-w-0 bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm text-gray-200 placeholder-gray-500 focus:outline-none focus:border-indigo-600" />
          <input value={newDir} onChange={e => setNewDir(e.target.value)}
            placeholder="工作目錄（選填，如 /home/user/project）"
            className="w-full min-w-0 bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm text-gray-200 placeholder-gray-500 focus:outline-none focus:border-indigo-600 font-mono" />
          {/* 寬螢幕側欄寬度有限：單行四個控制項會溢出，改為兩行 */}
          <div className="grid grid-cols-2 gap-2 min-w-0">
            <select value={newAgent}
              onChange={e => {
                const next = e.target.value;
                setNewAgent(next);
                setNewMode(prev => normalizePermMode(next, prev));
              }}
              className="min-w-0 max-w-full bg-gray-800 border border-gray-700 rounded-lg px-2 py-2 text-sm text-gray-300">
              <option value="claude">Claude</option>
              <option value="cursor">Cursor</option>
              <option value="gemini">Gemini</option>
              <option value="codex" disabled>Codex（未支援）</option>
            </select>
            <select value={newMode} onChange={e => setNewMode(e.target.value)}
              className="min-w-0 max-w-full bg-gray-800 border border-gray-700 rounded-lg px-2 py-2 text-sm text-gray-300"
              disabled={newAgent === 'codex'}>
              {permModeOptionsFor(newAgent).map((opt) => (
                <option key={opt.value} value={opt.value}>{opt.label}</option>
              ))}
            </select>
          </div>
          <div className="flex flex-wrap gap-2 justify-end">
            <button onClick={create} disabled={loading || !newName.trim()}
              className="px-4 py-2 bg-indigo-600 hover:bg-indigo-500 disabled:opacity-40 text-white rounded-lg text-sm font-medium shrink-0">
              建立
            </button>
            <button onClick={() => setShowForm(false)}
              className="px-3 py-2 bg-gray-700 hover:bg-gray-600 text-gray-300 rounded-lg text-sm shrink-0">
              取消
            </button>
          </div>
        </div>
      )}

      {/* Session 列表 */}
      <div className="flex-1 overflow-y-auto app-scroll">
        {sessions.length === 0 ? (
          <div className="text-center text-gray-600 mt-24 text-sm">尚無 Session，點右上角建立</div>
        ) : displaySessions.length === 0 ? (
          <div className="text-center text-gray-600 mt-24 text-sm px-4">沒有符合搜尋條件的 Session</div>
        ) : displaySessions.map(s => (
          <div key={s.id} onClick={() => renamingId !== s.id && onEnter(s)}
            className="flex items-center justify-between px-4 py-3.5 border-b border-gray-800 hover:bg-gray-800/50 active:bg-gray-700/50 cursor-pointer transition-colors">
            <div className="min-w-0 flex-1 mr-2">
              {renamingId === s.id ? (
                <input
                  ref={renameInputRef}
                  value={renameVal}
                  onChange={e => setRenameVal(e.target.value)}
                  onKeyDown={e => handleRenameKey(e, s.id)}
                  onBlur={() => commitRename(s.id)}
                  onClick={e => e.stopPropagation()}
                  className="w-full bg-gray-700 border border-indigo-500 rounded px-2 py-1 text-sm text-gray-100 focus:outline-none"
                />
              ) : (
                <div className="flex items-center gap-2 min-w-0">
                  <div className="text-sm font-bold text-gray-100 truncate">{s.name || '未命名'}</div>
                  <span className={`inline-flex items-center gap-1 shrink-0 text-[10px] px-2 py-0.5 rounded-full font-mono uppercase ${getAgentBadgeClass(s.agent_type)}`}>
                    <AgentBadgeIcon agentType={s.agent_type} />
                    {AGENT_LABEL[s.agent_type] || s.agent_type || 'claude'}
                  </span>
                </div>
              )}
              {s.work_dir && (
                <div className="text-xs text-gray-500 font-mono mt-0.5 truncate">{s.work_dir}</div>
              )}
              {((s.agent_type || 'claude') !== 'codex') && s.permission_mode && (
                <div className="text-xs text-gray-600 mt-0.5">{PERM_MODE_LABEL[s.permission_mode] || s.permission_mode}</div>
              )}
            </div>
            <div className="flex items-center gap-1.5 shrink-0">
              {(s.status === 'running') && (
                <span className="relative flex h-2 w-2 shrink-0" title="執行中">
                  <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-indigo-400 opacity-75" />
                  <span className="relative inline-flex rounded-full h-2 w-2 bg-indigo-500" />
                </span>
              )}
              {(s.status === 'awaiting_confirm') && (
                <span className="text-amber-400 text-sm shrink-0 font-bold" title="待授權">!</span>
              )}
              <button type="button" onClick={(e) => startRename(s, e)}
                aria-label="重新命名"
                title="重新命名"
                className="text-gray-600 hover:text-indigo-400 p-1.5 rounded transition-colors inline-flex items-center justify-center">
                {/* outline 鉛筆／編輯圖示（Flaticon 類常見線條風格） */}
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-4 h-4 shrink-0" aria-hidden="true">
                  <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
                  <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
                </svg>
              </button>
              <button onClick={(e) => del(s.id, e)}
                className="text-gray-600 hover:text-red-400 px-2 py-1 text-xs rounded transition-colors">
                刪除
              </button>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── 聊天畫面 ─────────────────────────────────────────────────────────────────
function ChatView({ session, onBack, showBack = true, fullHeight = true }) {
  const agentType = session.agent_type || 'claude';
  const isClaude  = agentType === 'claude';
  // Claude / Cursor / Gemini 皆支援 mode 切換（Codex 暫無對應概念）
  const showPermModeSelect = agentType !== 'codex';
  const permModeOptions = permModeOptionsFor(agentType);
  const [messages, setMessages]   = useState([]);
  const [input, setInput]         = useState('');
  const [state, setState]         = useState('IDLE');
  const [permTools, setPermTools] = useState([]);
  const [mode, setMode]           = useState(() => normalizePermMode(agentType, session.permission_mode || 'default'));
  const [histLoaded, setHistLoaded] = useState(false);
  const wsRef     = useRef(null);
  const bottomRef = useRef(null);
  const streamBuf = useRef('');
  const connGenRef = useRef(0);
  const activeSessionRef = useRef(session.id);
  const reconnectTimerRef = useRef(null);

  // 捲到底
  useEffect(() => {
    bottomRef.current?.scrollIntoView({ behavior: 'smooth' });
  }, [messages]);

  // 離開頁面確認（任務進行中或等待授權時）
  useEffect(() => {
    const handler = (e) => {
      if (state === 'THINKING' || state === 'STREAMING' || state === 'AWAITING_CONFIRM') {
        e.preventDefault();
        e.returnValue = '';
      }
    };
    window.addEventListener('beforeunload', handler);
    return () => window.removeEventListener('beforeunload', handler);
  }, [state]);

  // session 切換時重置顯示與狀態，避免殘留舊會話上下文
  useEffect(() => {
    activeSessionRef.current = session.id;
    streamBuf.current = '';
    setMessages([]);
    setHistLoaded(false);
    setState('IDLE');
    setPermTools([]);
    setInput('');
    setMode(normalizePermMode(agentType, session.permission_mode || 'default'));
  }, [session.id, session.permission_mode, agentType]);

  // 載入歷史 + 建立 WS
  useEffect(() => {
    connGenRef.current += 1;
    const effectGen = connGenRef.current;
    let cancelled = false;

    const isCurrent = () =>
      !cancelled && effectGen === connGenRef.current && activeSessionRef.current === session.id;

    const clearReconnectTimer = () => {
      if (reconnectTimerRef.current) {
        clearTimeout(reconnectTimerRef.current);
        reconnectTimerRef.current = null;
      }
    };

    const init = async () => {
      // 載入歷史紀錄
      let hist = [];
      try {
        const res = await apiFetch(`/sessions/${session.id}/messages`);
        if (res.ok) {
          const data = await res.json();
          if (Array.isArray(data)) hist = data;
          else console.warn('[messages] unexpected payload', data);
        } else {
          console.warn('[messages] load failed', res.status);
        }
      } catch (err) {
        console.warn('[messages] load error', err);
      }
      if (isCurrent()) {
        setMessages(hist.map(mapMessageRow));
        const lastClaude = [...hist].reverse().find((m) => m.role === 'claude' && m.status === 'pending');
        streamBuf.current = lastClaude ? (lastClaude.content || '') : '';
        setHistLoaded(true);
      }

      // 建立 WebSocket
      connectWS();
    };

    const connectWS = () => {
      if (!isCurrent()) return;
      clearReconnectTimer();
      const ws = new WebSocket(wsURL(session.id));
      ws._sessionId = session.id;
      ws._gen = effectGen;
      wsRef.current = ws;

      ws.onmessage = (evt) => {
        if (!isCurrent() || wsRef.current !== ws) return;
        const msg = JSON.parse(evt.data);

        if (msg.type === 'sync') {
          setState(msg.value);
          if (msg.messages) {
            const rows = Array.isArray(msg.messages) ? msg.messages : JSON.parse(msg.messages);
            const mapped = rows.map(mapMessageRow);
            const lastClaude = [...rows].reverse().find((m) => m.role === 'claude' && (m.status || 'done') === 'pending');
            streamBuf.current = lastClaude ? (lastClaude.content || '') : '';
            setMessages(mapped);
          }
          return;
        }

        if (msg.type === 'status') {
          setState(msg.value);
          if (msg.value === 'THINKING') {
            streamBuf.current = '';
            setMessages((prev) => {
              const last = prev[prev.length - 1];
              if (last && last.role === 'claude' && last.streaming && last.status === 'pending') {
                return prev;
              }
              return [...prev, { role: 'claude', content: '', html: null, streaming: true, status: 'pending' }];
            });
          }
          if (msg.value === 'IDLE' || msg.value === 'AWAITING_CONFIRM') {
            setMessages((prev) => prev.map((m, i) =>
              i === prev.length - 1 ? { ...m, streaming: false, status: m.status === 'pending' ? 'done' : m.status } : m
            ));
          }
        }

        if (msg.type === 'reset') {
          setMessages([]);
          streamBuf.current = '';
        }

        if (msg.type === 'user_message') {
          setMessages(prev => [...prev, { role: 'user', content: msg.content }]);
        }

        if (msg.type === 'delta') {
          streamBuf.current += msg.content;
          const html = parseMarkdown(streamBuf.current);
          setMessages((prev) => prev.map((m, i) =>
            i === prev.length - 1 ? { ...m, content: streamBuf.current, html, streaming: true, status: 'pending' } : m
          ));
        }

        if (msg.type === 'permission_request') {
          setPermTools(msg.tools || []);
        }
      };

      ws.onerror = (evt) => {
        console.error('[ws] 連線錯誤', evt);
      };

      ws.onclose = (evt) => {
        console.warn('[ws] 連線關閉', evt.code, evt.reason);
        if (!isCurrent() || wsRef.current !== ws) return;
        reconnectTimerRef.current = setTimeout(() => {
          reconnectTimerRef.current = null;
          connectWS();
        }, 2000);
      };
    };

    init();

    return () => {
      cancelled = true;
      clearReconnectTimer();
      if (wsRef.current && wsRef.current._gen === effectGen) {
        wsRef.current.close();
        wsRef.current = null;
      }
    };
  }, [session.id]);

  const send = useCallback((obj) => {
    const ws = wsRef.current;
    if (!ws || ws.readyState !== 1) return false;
    if (ws._sessionId !== activeSessionRef.current || ws._sessionId !== session.id) return false;
    ws.send(JSON.stringify(obj));
    return true;
  }, [session.id]);

  const handleSend = () => {
    const trimmed = input.trim();
    if (!trimmed || state !== 'IDLE') return;
    if (trimmed === '/reset' || trimmed === '/clear') {
      send({ type: 'reset_context' });
      setInput('');
      return;
    }
    const sent = send({ type: 'input', data: trimmed });
    if (!sent) return;
    setInput('');
  };

  const handleKeyDown = (e) => {
    if (e.key !== 'Enter') return;
    // 僅在 Ctrl/Cmd + Enter 時送出；單獨 Enter 保留為換行（行動版鍵盤的 Enter 多半不帶 Shift，
    // 舊版「Enter 即送出」會讓使用者還沒打完多行就送出，AI 只收到第一行。）
    if (e.ctrlKey || e.metaKey) {
      e.preventDefault();
      handleSend();
    }
  };

  const handleAllowOnce = () => {
    send({ type: 'allow_once', tools: permTools.map(t => t.tool_name) });
    setPermTools([]);
  };

  const handleSetMode = (newMode) => {
    setMode(newMode);
    send({ type: 'set_mode', mode: newMode });
    setPermTools([]);
  };

  const handleInterrupt = () => send({ type: 'interrupt' });

  const isDisabled = state !== 'IDLE';

  return (
    <div className={`flex flex-col ${fullHeight ? 'h-screen' : 'h-full'}`}>
      {/* Header：窄螢幕改直向堆疊，權限列獨立一行，避免與標題搶寬 */}
      <div className="flex flex-col gap-2 px-4 py-2 bg-gray-900 border-b border-gray-800 shrink-0 sm:flex-row sm:items-center sm:justify-between sm:gap-3"
           style={{ paddingTop: 'calc(0.5rem + env(safe-area-inset-top) + var(--tg-content-safe-top))' }}>
        <div className="flex items-start gap-2 min-w-0 w-full sm:min-w-0 sm:flex-1 sm:items-center">
          {showBack && (
            <button type="button" onClick={onBack}
              className="shrink-0 text-gray-400 hover:text-gray-200 text-lg leading-none px-1 mt-0.5 sm:mt-0">
              ←
            </button>
          )}
          <div className="min-w-0 flex-1">
            <div className="flex flex-wrap items-center gap-x-2 gap-y-1 min-w-0">
              <div className="font-bold text-indigo-400 text-sm truncate min-w-0">{session.name || '未命名'}</div>
              <span className={`inline-flex items-center gap-1 shrink-0 text-[10px] px-1.5 sm:px-2 py-0.5 rounded-full font-mono uppercase ${getAgentBadgeClass(agentType)}`}>
                <AgentBadgeIcon agentType={agentType} />
                {agentType}
              </span>
              <span className={`text-[10px] sm:text-xs px-1.5 sm:px-2 py-0.5 rounded-full font-mono shrink-0 ${
                state === 'IDLE'            ? 'bg-green-900 text-green-300' :
                state === 'THINKING'        ? 'bg-indigo-900 text-indigo-300' :
                state === 'STREAMING'       ? 'bg-blue-900 text-blue-300' :
                'bg-yellow-900 text-yellow-300'
              }`}>{state}</span>
            </div>
            {session.work_dir && (
              <div className="text-xs text-gray-500 font-mono truncate mt-0.5">{session.work_dir}</div>
            )}
          </div>
        </div>
        {showPermModeSelect && (
          <select
            value={mode}
            onChange={e => handleSetMode(e.target.value)}
            title={agentType === 'gemini'
              ? '對應 gemini --approval-mode'
              : agentType === 'cursor'
              ? '權限模式（bypass：Cursor 會加 --force）'
              : '權限模式'}
            className="text-xs bg-gray-800 border border-gray-700 rounded-lg px-2 py-1.5 text-gray-300 w-full sm:w-auto sm:min-w-[7.5rem] sm:max-w-[12rem] shrink-0">
            {permModeOptions.map((opt) => (
              <option key={opt.value} value={opt.value}>{opt.label}</option>
            ))}
          </select>
        )}
      </div>

      {/* 訊息列表 */}
      <div className="flex-1 overflow-y-auto app-scroll px-4 py-4 space-y-3">
        {histLoaded && messages.length === 0 && (
          <div className="text-center text-gray-600 mt-20 text-sm">輸入指令開始對話</div>
        )}
        {messages.map((m, i) => {
          const showStreamingTail =
            (state === 'THINKING' || state === 'STREAMING') &&
            m.role === 'claude' &&
            i === messages.length - 1;
          return (
          <div
            key={m.id != null ? `m-${m.id}` : i}
            className={`flex w-full min-w-0 ${m.role === 'user' ? 'justify-end' : 'justify-start'}`}
          >
            <div
              className={`rounded-xl px-4 py-3 text-sm w-fit max-w-[85%] min-w-0 ${
                m.role === 'user' ? 'bubble-user' : 'bubble-claude'
              }`}
            >
            <div className="text-xs text-gray-500 mb-1">
              {m.role === 'user' ? '你' : (agentType === 'cursor' ? 'Cursor' : agentType === 'codex' ? 'Codex' : agentType === 'gemini' ? 'Gemini' : 'Claude')}
            </div>
            {m.role === 'claude' ? (
              (m.html || showStreamingTail) ? (
                <div className="flex flex-row items-end gap-1">
                  {m.html && (
                    <div className="prose text-gray-200 text-sm flex-1 min-w-0" dangerouslySetInnerHTML={{ __html: m.html }} />
                  )}
                  {showStreamingTail && (
                    <span className="streaming-tail shrink-0 select-none" aria-hidden="true">...</span>
                  )}
                </div>
              ) : (
                <><span className="dot"/><span className="dot"/><span className="dot"/></>
              )
            ) : (
              <div className="whitespace-pre-wrap text-gray-200 break-words">{m.content}</div>
            )}
            </div>
          </div>
          );
        })}

        {/* 授權確認 */}
        {state === 'AWAITING_CONFIRM' && permTools.length > 0 && (
          <div className="rounded-xl border border-yellow-700 bg-yellow-950/40 px-4 py-3 text-sm mr-8">
            <div className="text-yellow-400 font-semibold mb-2">需要授權</div>
            {permTools.map((t, i) => (
              <div key={i} className="text-gray-300 text-xs font-mono mb-1">
                {t.tool_name}
                {t.tool_input && (
                  <span className="text-gray-500"> — {JSON.stringify(t.tool_input).slice(0, 80)}</span>
                )}
              </div>
            ))}
            <div className="flex gap-2 mt-3">
              <button onClick={handleAllowOnce}
                className="px-3 py-1.5 bg-yellow-700 hover:bg-yellow-600 text-white rounded-lg text-xs">
                允許此操作
              </button>
              <button onClick={() => handleSetMode('acceptEdits')}
                className="px-3 py-1.5 bg-orange-700 hover:bg-orange-600 text-white rounded-lg text-xs">
                允許並記住
              </button>
            </div>
          </div>
        )}

        <div ref={bottomRef} />
      </div>

      {/* 輸入區 */}
      <div className="shrink-0 px-4 py-3 bg-gray-900 border-t border-gray-800"
           style={{ paddingBottom: 'calc(0.75rem + env(safe-area-inset-bottom))' }}>
        {state === 'STREAMING' || state === 'THINKING' ? (
          <button onClick={handleInterrupt}
            className="w-full py-2 bg-red-900/60 hover:bg-red-800 text-red-300 rounded-lg text-sm">
            中斷
          </button>
        ) : (
          <div className="flex gap-2">
            <textarea
              value={input}
              onChange={e => setInput(e.target.value)}
              onKeyDown={handleKeyDown}
              disabled={isDisabled}
              placeholder="輸入指令…（Enter 換行；Ctrl+Enter 或按鈕送出）"
              rows={2}
              className="flex-1 resize-none bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm text-gray-200 placeholder-gray-600 focus:outline-none focus:border-indigo-600 disabled:opacity-40"
            />
            <button onClick={handleSend} disabled={isDisabled || !input.trim()}
              className="px-4 bg-indigo-600 hover:bg-indigo-500 disabled:opacity-30 text-white rounded-lg text-sm font-medium">
              送出
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

// ── 密碼輸入畫面（非 TMA 環境）────────────────────────────────────────────────
function PasswordView({ onSuccess }) {
  const [pwd, setPwd]     = useState('');
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);

  const submit = async () => {
    if (!pwd.trim()) return;
    setLoading(true);
    setError('');
    const res = await fetch('/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pwd }),
    });
    setLoading(false);
    if (res.ok) {
      onSuccess();
    } else {
      const data = await res.json().catch(() => ({}));
      setError(data.error || '密碼錯誤，請重試');
    }
  };

  const handleKey = (e) => {
    if (e.key === 'Enter') submit();
  };

  return (
    <div className="flex items-center justify-center h-screen">
      <div className="w-72 space-y-4">
        <div className="text-center">
          <div className="text-indigo-400 text-2xl font-bold mb-1">Claude Code</div>
          <div className="text-gray-500 text-sm">請輸入存取密碼</div>
        </div>
        <input
          type="password"
          value={pwd}
          onChange={e => setPwd(e.target.value)}
          onKeyDown={handleKey}
          placeholder="密碼"
          autoFocus
          className="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-sm text-gray-200 placeholder-gray-500 focus:outline-none focus:border-indigo-600"
        />
        {error && <div className="text-red-400 text-xs text-center">{error}</div>}
        <button onClick={submit} disabled={loading || !pwd.trim()}
          className="w-full py-2.5 bg-indigo-600 hover:bg-indigo-500 disabled:opacity-40 text-white rounded-lg text-sm font-medium">
          {loading ? '驗證中…' : '進入'}
        </button>
      </div>
    </div>
  );
}

// ── Debug Banner（開發用，上線前移除）────────────────────────────────────────
const DEBUG_BANNER = false;
function DebugBanner() {
  if (!DEBUG_BANNER) return null;
  return (
    <div style={{position:'fixed',top:0,left:0,right:0,background:'#1a1a00',color:'#ffff00',fontSize:'10px',padding:'4px 8px',zIndex:9999,wordBreak:'break-all'}}>
      isTMA={String(isTMA)} | TG={String(isTelegram)} | initData={initData ? initData.slice(0,40)+'…' : '(empty)'}
    </div>
  );
}

// ── Root ──────────────────────────────────────────────────────────────────────
function App() {
  const [session, setSession] = useState(null);
  const [authed, setAuthed]   = useState(isTelegram);
  const [isWideScreen, setIsWideScreen] = useState(() => window.matchMedia('(min-width: 1024px)').matches);
  // 非 TMA 環境：mount 時試探 cookie 是否仍有效
  const [checking, setChecking] = useState(!isTelegram);

  useEffect(() => {
    if (isTelegram) return;
    fetch('/sessions').then(res => {
      if (res.ok) setAuthed(true);
    }).finally(() => setChecking(false));
  }, []);

  useEffect(() => {
    const media = window.matchMedia('(min-width: 1024px)');
    const handleChange = (e) => setIsWideScreen(e.matches);
    setIsWideScreen(media.matches);
    if (media.addEventListener) {
      media.addEventListener('change', handleChange);
    } else {
      media.addListener(handleChange);
    }
    return () => {
      if (media.removeEventListener) {
        media.removeEventListener('change', handleChange);
      } else {
        media.removeListener(handleChange);
      }
    };
  }, []);

  if (checking) {
    return <div className="flex items-center justify-center h-screen"><div className="text-gray-500 text-sm">載入中…</div></div>;
  }

  const renderAuthedLayout = () => {
    if (!isWideScreen) {
      return session
        ? <ChatView session={session} onBack={() => setSession(null)} />
        : <SessionView onEnter={setSession} />;
    }

    return (
      <div className="h-screen flex bg-black">
        <aside className="w-[360px] max-w-[40vw] min-w-0 border-r border-gray-800 bg-gray-950 flex flex-col">
          <SessionView onEnter={setSession} />
        </aside>
        <main className="flex-1 min-w-0">
          {session ? (
            <ChatView session={session} onBack={() => setSession(null)} showBack={false} fullHeight={false} />
          ) : (
            <div className="h-full flex items-center justify-center text-gray-500 text-sm bg-gray-950/40">
              請從左側選擇一個 Session 開始對話
            </div>
          )}
        </main>
      </div>
    );
  };

  return (
    <>
      <DebugBanner />
      {!authed
        ? <PasswordView onSuccess={() => setAuthed(true)} />
        : renderAuthedLayout()
      }
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

<div id="root" class="h-screen"></div>
</body>
