<script type="text/babel" data-presets="react-classic">
const { useState, useEffect, useLayoutEffect, useRef, useCallback, useMemo } = React;

// ── Telegram WebApp 初始化 ────────────────────────────────────────────────────
const tgApp = window.Telegram?.WebApp;
// 判斷是否在 Telegram WebView 裡（即使 initData 暫時為空也算）
const isTMA = !!(tgApp);
const initData = isTMA ? (tgApp.initData || '') : '';
// 有 initData 才走 TG 驗證，否則 fallback 到密碼驗證
const isTelegram = isTMA && initData !== '';

if (isTMA) {
  tgApp.ready();
  tgApp.expand();
  tgApp.disableVerticalSwipes?.();
  const updateContentSafeArea = () => {
    const top = tgApp.contentSafeAreaInset?.top ?? 0;
    document.documentElement.style.setProperty('--tg-content-safe-top', `${top}px`);
  };
  updateContentSafeArea();
  tgApp.onEvent('contentSafeAreaChanged', updateContentSafeArea);
}

/** Web 登入 session token（localStorage；後端仍驗證於伺服器端 store） */
const WEB_SESSION_STORAGE_KEY = 'cc_web_session_token';

/** 桌面版側欄寬度（localStorage，px；與原 max-w-[48vw] 上限一致） */
const SIDEBAR_WIDTH_STORAGE_KEY = 'cc_sidebar_width_px';
const SIDEBAR_WIDTH_DEFAULT = 340;
const SIDEBAR_WIDTH_MIN = 260;

function readStoredSidebarWidthPx() {
  try {
    const raw = localStorage.getItem(SIDEBAR_WIDTH_STORAGE_KEY);
    const n = parseInt(raw, 10);
    if (Number.isFinite(n) && n > 0) return n;
  } catch (_) {}
  return SIDEBAR_WIDTH_DEFAULT;
}

/** Session 列表「依工作目錄分組」開關（localStorage） */
const SESSION_LIST_GROUP_BY_DIR_KEY = 'cc_session_list_group_by_dir';

function readStoredGroupByDir() {
  try {
    const raw = localStorage.getItem(SESSION_LIST_GROUP_BY_DIR_KEY);
    if (raw === '1' || raw === 'true') return true;
    if (raw === '0' || raw === 'false') return false;
  } catch (_) {}
  return true; /* RemoteAgent 設計預設依目錄分組 */
}

function clampSidebarWidthPx(w) {
  const max = Math.max(SIDEBAR_WIDTH_MIN, Math.floor(window.innerWidth * 0.48));
  return Math.min(Math.max(Math.round(w), SIDEBAR_WIDTH_MIN), max);
}

function sidebarWidthMaxPx() {
  return Math.max(SIDEBAR_WIDTH_MIN, Math.floor(window.innerWidth * 0.48));
}

/**
 * 正規化 API base path：無結尾 /；根為 ''；一律以 / 開頭（非空時）。
 */
function normalizeApiBasePath(raw) {
  if (raw == null) return null;
  let b = String(raw).trim();
  if (b === '' || b === '/') return '';
  b = b.replace(/\/+$/, '');
  if (!b.startsWith('/')) b = `/${b}`;
  return b;
}

/**
 * 可選覆寫：反代若無法由網址自動對齊 API 節點時使用。
 * - <meta name="cc-api-base" content="/myapp">（需在 bundle 執行前存在於 DOM）
 * - 或於任何 script 以前：window.__CC_API_BASE__ = '/myapp'
 */
function readApiBaseOverride() {
  try {
    const el = document.querySelector('meta[name="cc-api-base"]');
    if (el) {
      const c = el.getAttribute('content');
      if (c != null && String(c).trim() !== '') {
        return normalizeApiBasePath(c);
      }
    }
  } catch (_) {}
  if (typeof window.__CC_API_BASE__ === 'string' && window.__CC_API_BASE__.trim() !== '') {
    return normalizeApiBasePath(window.__CC_API_BASE__);
  }
  return null;
}

/**
 * 與 Go Fiber 同掛一條反代前綴時：目前 index 所在目錄為 API 前綴。
 * 若在 …/Nexus/、…/Focus/、…/Enterprise/、…/RemoteAgent/、…/v1/ 測試主題底下，再剝除該目錄，與同層主介面共用前綴。
 */
function inferApiBaseFromPathname() {
  let p = window.location.pathname || '/';
  if (/\/[^/]+\.html$/i.test(p)) {
    p = p.replace(/\/[^/]+\.html$/i, '');
  }
  p = p.replace(/\/+$/, '');
  p = p.replace(/\/nexus$/i, '').replace(/\/focus$/i, '').replace(/\/enterprise$/i, '').replace(/\/remoteagent$/i, '').replace(/\/v1$/i, '');
  p = p.replace(/\/+$/, '');
  if (p === '' || p === '/') return '';
  return p;
}

function getSpaBasePath() {
  const over = readApiBaseOverride();
  if (over !== null) return over;
  return inferApiBaseFromPathname();
}

/** API 路徑（必須以 / 開頭）加上 base，供反代剝離前綴時瀏覽器仍打對外完整路徑。 */
function appPath(path) {
  const rel = path.startsWith('/') ? path : `/${path}`;
  const base = getSpaBasePath();
  if (!base) return rel;
  return `${base}${rel}`;
}

function resolveApiUrl(url) {
  if (/^https?:\/\//i.test(url)) return url;
  if (url.startsWith('/')) return appPath(url);
  return url;
}

console.log(
  '[init] isTMA:', isTMA,
  'isTelegram:', isTelegram,
  'initData len:', initData.length,
  'protocol:', location.protocol,
  'spaBase:', getSpaBasePath() || '(root)',
);

// Web session 過期時統一登出（僅 Web 密碼登入，TMA 不受影響）
let onSessionExpired = null;
const registerSessionExpiredHandler = (fn) => { onSessionExpired = fn; };

const clearWebSession = () => {
  try {
    const t = localStorage.getItem(WEB_SESSION_STORAGE_KEY);
    localStorage.removeItem(WEB_SESSION_STORAGE_KEY);
    if (t) {
      fetch(resolveApiUrl('/auth/logout'), {
        method: 'POST',
        headers: { Authorization: `Bearer ${t}` },
      }).catch(() => {});
    }
  } catch (_) {}
  onSessionExpired?.();
};

const handleUnauthorized = (res) => {
  if (!isTelegram && res.status === 401) {
    clearWebSession();
    return true;
  }
  return false;
};

// 統一 fetch：TMA 帶 initData；Web 帶 Bearer（localStorage），舊版仍相容後端 Cookie
const apiFetch = async (url, opts = {}) => {
  const headers = { ...(opts.headers || {}) };
  if (isTelegram) {
    headers['X-Telegram-Init-Data'] = initData;
  } else {
    try {
      const t = localStorage.getItem(WEB_SESSION_STORAGE_KEY);
      if (t) headers['Authorization'] = `Bearer ${t}`;
    } catch (_) {}
  }
  const res = await fetch(resolveApiUrl(url), { ...opts, headers });
  handleUnauthorized(res);
  return res;
};

// WebSocket：同源 ws/wss；TMA 用 query initData；Web 用 query token（瀏覽器無法自訂 WS Header）
const wsURL = (sessionId) => {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  let url = `${proto}://${location.host}${appPath(`/sessions/${sessionId}/ws`)}`;
  const sep = (u) => (u.includes('?') ? '&' : '?');
  if (isTelegram) {
    return `${url}${sep(url)}initData=${encodeURIComponent(initData)}`;
  }
  try {
    const t = localStorage.getItem(WEB_SESSION_STORAGE_KEY);
    if (t) return `${url}${sep(url)}token=${encodeURIComponent(t)}`;
  } catch (_) {}
  return url;
};

marked.setOptions({
  highlight: (code, lang) => {
    if (lang && hljs.getLanguage(lang)) return hljs.highlight(code, { language: lang }).value;
    return hljs.highlightAuto(code).value;
  },
  breaks: true,
});

const parseMarkdown = (text) => {
  const html = marked.parse(text);
  return html
    .replace(/<table>/g, '<div class="table-wrap"><table>')
    .replace(/<\/table>/g, '</table></div>');
};

/** 顯示用：permission_mode 值 → 中文標籤。包含 Claude/Cursor 與 Gemini 兩套值。 */
const PERM_MODE_LABEL = {
  default: '預設',
  acceptEdits: '自動編輯',
  bypassPermissions: '⚠️ 跳過授權',
  auto_edit: '自動編輯',
  yolo: '⚠️ YOLO（全自動）',
  plan: '規劃模式',
};

const AGENT_LABEL = { claude: 'Claude', cursor: 'Cursor', codex: 'Codex', antigravity: 'Antigravity', kiro: 'Kiro', kiroacp: 'Kiro ACP' };

/** 聊天室頂欄狀態角標：中文短標（避免與權限列搶注意力） */
const SESSION_STATE_LABEL = {
  IDLE: '待命',
  THINKING: '思考中',
  STREAMING: '輸出中',
  AWAITING_CONFIRM: '待授權',
  SHELL_IDLE: '待命',
  SHELL_AWAITING_APPROVAL: '等待確認',
  SHELL_RUNNING: '執行中',
  AWAITING_SHELL_CONFIRM: '待確認 Shell',
  SHELL_EXEC: 'Shell 執行中',
};

const CHAT_HEADER_COLLAPSED_KEY = 'cc_chat_header_collapsed';

function readChatHeaderCollapsedPref() {
  try {
    const v = localStorage.getItem(CHAT_HEADER_COLLAPSED_KEY);
    if (v === '1') return true;
    if (v === '0') return false;
  } catch (_) {}
  return null;
}

function writeChatHeaderCollapsedPref(collapsed) {
  try {
    localStorage.setItem(CHAT_HEADER_COLLAPSED_KEY, collapsed ? '1' : '0');
  } catch (_) {}
}

function useMediaQuery(query) {
  const [matches, setMatches] = useState(() =>
    typeof window !== 'undefined' ? window.matchMedia(query).matches : false
  );
  useEffect(() => {
    if (typeof window === 'undefined') return undefined;
    const mq = window.matchMedia(query);
    const onChange = () => setMatches(mq.matches);
    mq.addEventListener('change', onChange);
    onChange();
    return () => mq.removeEventListener('change', onChange);
  }, [query]);
  return matches;
}

/** 手機預設收合；偏好寫入 localStorage */
function useChatHeaderCollapsed() {
  const isMobile = useMediaQuery('(max-width: 639px)');
  const [collapsed, setCollapsedState] = useState(() => {
    const saved = readChatHeaderCollapsedPref();
    if (saved != null) return saved;
    return typeof window !== 'undefined' && window.matchMedia('(max-width: 639px)').matches;
  });
  const setCollapsed = useCallback((v) => {
    setCollapsedState(v);
    writeChatHeaderCollapsedPref(v);
  }, []);
  return {
    collapsed: isMobile && collapsed,
    setCollapsed,
    isMobile,
    toggle: () => setCollapsed(!collapsed),
  };
}

function formatKiroCreditUsed(displayText) {
  const pct = String(displayText).match(/Credits\s+([\d.]+)\s*%/);
  const frac = String(displayText).match(/\(([\d.]+)\s*\/\s*([\d.]+)\)/);
  if (!pct && !frac) return '';
  const fmt = (n) => (Math.abs(n - Math.round(n)) < 0.05 ? String(Math.round(n)) : n.toFixed(1));
  if (pct && frac) return pct[1] + '% (' + fmt(parseFloat(frac[1])) + '/' + fmt(parseFloat(frac[2])) + ')';
  if (pct) return pct[1] + '%';
  return fmt(parseFloat(frac[1])) + '/' + fmt(parseFloat(frac[2]));
}

function formatQuotaCompact(displayText, agentType) {
  if (!displayText || displayText === '—') return '';
  if (String(agentType || '').toLowerCase() === 'kiro' || String(agentType || '').toLowerCase() === 'kiroacp') {
    const kiro = formatKiroCreditUsed(displayText);
    if (kiro) return kiro;
  }
  const first = String(displayText).split(' · ')[0].trim();
  if (first.length <= 11) return first;
  const m = first.match(/(\d+(?:\.\d+)?)\s*%/);
  return m ? m[0] : first.slice(0, 10) + '…';
}

function permModeLabelFor(agentType, value) {
  const hit = permModeOptionsFor(agentType).find((o) => o.value === value);
  return hit ? hit.label : value;
}

function permModeIsDanger(value) {
  return value === 'bypassPermissions' || value === 'yolo';
}

function sessionStateChipClass(state) {
  // 與 session 列表下方方塊 badge 同構：無邊框、軟底色
  if (state === 'IDLE' || state === 'SHELL_IDLE') return 'bg-[oklch(0.7_0.15_155_/16%)] text-[oklch(0.7_0.15_155)]';
  if (state === 'THINKING') return 'bg-violet-500/20 text-violet-300';
  if (state === 'STREAMING') return 'bg-sky-500/20 text-sky-300';
  if (state === 'SHELL_EXEC' || state === 'SHELL_RUNNING') return 'bg-amber-500/20 text-amber-200';
  if (state === 'AWAITING_SHELL_CONFIRM' || state === 'SHELL_AWAITING_APPROVAL' || state === 'AWAITING_CONFIRM') return 'bg-orange-500/20 text-orange-200';
  return 'bg-amber-500/20 text-amber-200';
}

function SessionStateChip({ state, activityHint, compact, className = '' }) {
  const label = compact
    ? (state === 'THINKING' && activityHint ? '思考' : (SESSION_STATE_LABEL[state] || state))
    : (state === 'THINKING' && activityHint ? activityHint : (SESSION_STATE_LABEL[state] || state));
  const dot =
    state === 'IDLE' || state === 'SHELL_IDLE' ? 'bg-[oklch(0.7_0.15_155)]' :
    state === 'THINKING' || state === 'STREAMING' || state === 'SHELL_EXEC' || state === 'SHELL_RUNNING' ? 'bg-[oklch(0.75_0.15_70)]' :
    'bg-[oklch(0.75_0.15_70)]';
  return (
    <span
      title={state}
      className={'inline-flex items-center gap-1.5 shrink-0 text-[11px] px-[7px] py-[3px] rounded-md font-semibold ' + sessionStateChipClass(state) + ' ' + className}
    >
      <span className={'w-1.5 h-1.5 rounded-full shrink-0 ' + dot} aria-hidden />
      {label}
    </span>
  );
}

function HeaderToggleButton({ expanded, onToggle, className = '' }) {
  return (
    <button
      type="button"
      onClick={onToggle}
      aria-expanded={expanded}
      aria-label={expanded ? '收合頂欄' : '展開頂欄'}
      className={'sm:hidden shrink-0 p-1 rounded-md text-gray-500 hover:text-gray-300 hover:bg-gray-800/70 transition-colors ' + className}
    >
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" className={'w-4 h-4 transition-transform duration-150 ' + (expanded ? 'rotate-180' : '')} aria-hidden>
        <path fillRule="evenodd" d="M5.23 7.21a.75.75 0 011.06.02L10 11.168l3.71-3.94a.75.75 0 111.08 1.04l-4.25 4.5a.75.75 0 01-1.08 0l-4.25-4.5a.75.75 0 01.02-1.06z" clipRule="evenodd" />
      </svg>
    </button>
  );
}

function AgentIconChip({ agentType, className = '' }) {
  const t = String(agentType || 'claude').toLowerCase();

const INPUT_MODE_STORAGE_PREFIX = 'cc_input_mode:';
/** 舊版單一全域鍵，僅在該 session 尚無專用紀錄時作為向後相容讀取 */
const INPUT_MODE_LEGACY_KEY = 'cc_input_mode';

/** 輸入框 `/` 觸發之 slash 命令清單（可選 `modes` 限定 inputMode，省略則全部顯示） */
const SLASH_COMMANDS = [
  {
    command: '/reset',
    description: '清除對話 context（等同 /clear）',
  },
  {
    command: '/clear',
    description: '清除對話 context（等同 /reset）',
  },
];

function inputModeStorageKey(sessionId) {
  return INPUT_MODE_STORAGE_PREFIX + String(sessionId || '');
}

const DRAFT_INPUT_STORAGE_PREFIX = 'cc_draft_input:';

function draftInputStorageKey(sessionId) {
  return DRAFT_INPUT_STORAGE_PREFIX + String(sessionId || '');
}

function clearDraftInputForSession(sessionId) {
  try {
    localStorage.removeItem(draftInputStorageKey(sessionId));
  } catch (_) {}
}

/** 依 session 從 localStorage 讀取輸入模式；該 session 未設定或無效時預設 agent */
function readInputModeForSession(sessionId) {
  try {
    const v = localStorage.getItem(inputModeStorageKey(sessionId));
    if (v === 'shell' || v === 'agent') return v;
    const legacy = localStorage.getItem(INPUT_MODE_LEGACY_KEY);
    if (legacy === 'shell' || legacy === 'agent') return legacy;
  } catch (_) {}
  return 'agent';
}

/**
 * 依 agent_type 回傳可用的 permission_mode 下拉選項。
 * - Claude / Cursor: default / acceptEdits / bypassPermissions
 * - Antigravity: default / auto_edit / plan / yolo（對應 CLI --approval-mode）
 * - Codex: 暫不支援
 * 所有值共用 DB 欄位 `permission_mode`，後端各 runner 自行解釋。
 */
function permModeOptionsFor(agentType) {
  const t = String(agentType || 'claude').toLowerCase();
  if (t === 'antigravity') {
    return [
      { value: 'default', label: '預設' },
      { value: 'auto_edit', label: '自動編輯' },
      { value: 'plan', label: '規劃模式' },
      { value: 'yolo', label: 'YOLO（全自動）⚠️' },
    ];
  }
  if (t === 'kiro' || t === 'kiroacp' || t === 'codex') {
    return [{ value: 'default', label: '預設（固定）' }];
  }
  return [
    { value: 'default', label: '預設' },
    { value: 'acceptEdits', label: '自動編輯' },
    { value: 'bypassPermissions', label: '跳過授權 ⚠️' },
  ];
}

/**
 * 建立 Session 時「自訂 CLI 引數」：每行一個 argv，trim 後略過空行。
 * 路徑含空格時請整段寫在同一行（勿用空格拆成多段）。
 */
function parseCliExtraArgs(text) {
  if (text == null || !String(text).trim()) return [];
  return String(text)
    .split(/\r?\n/)
    .map((line) => line.trim())
    .filter((line) => line.length > 0);
}

function extractModelFromCliArgs(parts) {
  if (!Array.isArray(parts)) return '';
  for (let i = 0; i < parts.length; i++) {
    if (parts[i] === '--model' || parts[i] === '-m') return String(parts[i + 1] || '').trim();
  }
  return '';
}

function cliArgsWithoutModel(parts) {
  if (!Array.isArray(parts)) return [];
  const out = [];
  for (let i = 0; i < parts.length; i++) {
    if (parts[i] === '--model' || parts[i] === '-m') {
      i++;
      continue;
    }
    out.push(parts[i]);
  }
  return out;
}

function mergeModelIntoCliExtraLines(cliText, modelVal) {
  const baseParts = parseCliExtraArgs(cliText);
  const stripped = [];
  for (let i = 0; i < baseParts.length; i++) {
    if (baseParts[i] === '--model' || baseParts[i] === '-m') {
      i++;
      continue;
    }
    stripped.push(baseParts[i]);
  }
  const m = String(modelVal || '').trim();
  if (m) {
    stripped.push('--model', m);
  }
  return stripped.join('\n');
}

function buildForwardUserPrompt(note, originalBody) {
  const n = String(note || '').trim();
  const o = String(originalBody || '').trim();
  if (!n) return o;
  return `${n}\n\n---\n（以下為規劃內容）\n\n${o}`;
}

function sendPromptViaEphemeralWS(sessionId, text) {
  return new Promise((resolve, reject) => {
    let settled = false;
    const settle = (fn) => {
      if (settled) return;
      settled = true;
      clearTimeout(timer);
      fn();
    };
    let opened = false;
    const ws = new WebSocket(wsURL(sessionId));
    const timer = setTimeout(() => {
      try {
        ws.close();
      } catch (_) {}
      settle(() => reject(new Error('連線逾時')));
    }, 20000);
    ws.onopen = () => {
      opened = true;
      try {
        ws.send(JSON.stringify({ type: 'input', data: text }));
      } catch (e) {
        settle(() => reject(e));
        try {
          ws.close();
        } catch (_) {}
        return;
      }
      setTimeout(() => {
        try {
          ws.close();
        } catch (_) {}
      }, 80);
    };
    ws.onerror = () => settle(() => reject(new Error('WebSocket 錯誤')));
    ws.onclose = () => {
      if (opened) settle(() => resolve());
      else settle(() => reject(new Error('無法連線')));
    };
  });
}

/** 切換 agent_type 時，若舊的 mode 在新 agent 下不合法，退回 default。 */
function normalizePermMode(agentType, mode) {
  const valid = permModeOptionsFor(agentType).map((o) => o.value);
  return valid.includes(mode) ? mode : 'default';
}

  const opts = permModeOptionsFor(agentType);

        disabled ? 'pointer-events-none opacity-45' : ''
      }`}
    >
      {opts.map((opt) => {

function PermModeSelect({ agentType, value, onChange, disabled, title, id, className }) {

      id={selectId}

function formatQuotaAge(iso) {
  if (!iso) return '';
  const t = Date.parse(iso);
  if (!Number.isFinite(t)) return '';
  const sec = Math.max(0, Math.floor((Date.now() - t) / 1000));
  if (sec < 60) return '剛剛更新';
  const min = Math.floor(sec / 60);
  if (min < 60) return min + ' 分鐘前';
  return Math.floor(min / 60) + ' 小時前';
}

  const text = quota && quota.display_text;

  const shown = compact ? formatQuotaCompact(text, agentType) : text;
  if (!shown) return null;
  const age = formatQuotaAge(quota.updated_at);
  const title = [text, age, quota.error].filter(Boolean).join(' · ');
  const textCls = quota.error ? 'text-amber-400' : quota.stale ? 'text-gray-500' : 'text-gray-400';

  return (
    <span className={chipCls + className} title={title}>
      <span className={'text-[10px] font-mono truncate ' + textCls}>{shown}</span>
      {!compact && onRefresh ? (
        <button
          type="button"
          onClick={onRefresh}

/** 解析 API 回傳的 last_active（SQLite datetime 字串）為毫秒時間戳 */
function sessionLastActiveMs(s) {
  if (!s || !s.last_active) return 0;
  const raw = String(s.last_active).trim();
  const t = Date.parse(raw.includes('T') ? raw : raw.replace(' ', 'T'));
  return Number.isNaN(t) ? 0 : t;
}

/** 解析訊息 created_at（SQLite datetime / ISO）為 Date；無效則回 null */
function parseMessageCreatedAt(raw) {
  if (raw == null || raw === '') return null;
  const s = String(raw).trim();
  // SQLite datetime('now') 為 UTC 且無時區後綴；補 Z 以免被當成本地時間
  let normalized = s;
  if (!s.includes('T')) normalized = s.replace(' ', 'T');
  if (!/[zZ]|[+-]\d{2}:?\d{2}$/.test(normalized)) normalized += 'Z';
  const t = Date.parse(normalized);
  if (Number.isNaN(t)) return null;
  return new Date(t);
}

/** 聊天氣泡下方時間：今日僅 HH:mm；昨日「昨天 HH:mm」；同年 M/D HH:mm；跨年 YYYY/M/D HH:mm */
function formatMessageTime(raw) {
  const d = parseMessageCreatedAt(raw);
  if (!d) return '';
  const now = new Date();
  const pad = (n) => String(n).padStart(2, '0');
  const hm = `${pad(d.getHours())}:${pad(d.getMinutes())}`;
  const startOfDay = (x) => new Date(x.getFullYear(), x.getMonth(), x.getDate()).getTime();
  const dayDiff = Math.round((startOfDay(now) - startOfDay(d)) / 86400000);
  if (dayDiff === 0) return hm;
  if (dayDiff === 1) return `昨天 ${hm}`;
  if (d.getFullYear() === now.getFullYear()) {
    return `${d.getMonth() + 1}/${d.getDate()} ${hm}`;
  }
  return `${d.getFullYear()}/${d.getMonth() + 1}/${d.getDate()} ${hm}`;
}

/** 目錄分組標頭：顯示路徑最後兩段，避免過長 */
function workDirGroupShortLabel(dirKey) {
  const unset = '（未設定工作目錄）';
  if (!dirKey || dirKey === unset) return unset;
  const p = String(dirKey).replace(/[/\\]+$/, '');
  const parts = p.split(/[/\\]/).filter(Boolean);
  if (parts.length === 0) return dirKey;
  if (parts.length === 1) return parts[0];
  return `${parts[parts.length - 2]}/${parts[parts.length - 1]}`;
}

/** 路徑最後一段，作為預設 Session 名稱 */
function workDirBasename(dirKey) {
  const unset = '（未設定工作目錄）';
  if (!dirKey || dirKey === unset) return '';
  const p = String(dirKey).replace(/[/\\]+$/, '');
  const parts = p.split(/[/\\]/).filter(Boolean);
  return parts.length ? parts[parts.length - 1] : '';
}

/** 依工作目錄排序用：空白路徑置底，其餘依路徑 localeCompare（numeric）。 */
function cmpSessionWorkDir(a, b) {
  const da = String(a.work_dir != null ? String(a.work_dir).trim() : '').toLowerCase();
  const db = String(b.work_dir != null ? String(b.work_dir).trim() : '').toLowerCase();
  if (!da && db) return 1;
  if (da && !db) return -1;
  return da.localeCompare(db, undefined, { numeric: true, sensitivity: 'base' });
}

function sortSessionsByWorkDirThenName(sessions) {
  if (!Array.isArray(sessions)) return [];
  return [...sessions].sort((a, b) => {
    const wd = cmpSessionWorkDir(a, b);
    if (wd !== 0) return wd;
    return String(a.name || '').localeCompare(String(b.name || ''), 'zh-Hant');
  });
}

function parseShellExitCode(content) {
  const m = content.match(/\[exit (-?\d+)\]\n?$/);
  return m ? parseInt(m[1], 10) : null;
}

function ShellOutput({ content, exitCode, streaming }) {
  const strippedContent = content.replace(/\n?\[exit -?\d+\]\n?$/, '');
  const resolvedExitCode = exitCode != null ? exitCode : (!streaming ? parseShellExitCode(content) : null);
  const lines = strippedContent.replace(/\r\n/g, '\n').replace(/\r/g, '\n').split('\n');
  return (
    <div>
      <pre className="text-xs font-mono whitespace-pre-wrap break-words leading-relaxed overflow-x-auto max-w-full">
        {lines.map((line, i) => {
          const nl = i < lines.length - 1 ? '\n' : '';
          if (line.startsWith('[stderr] ')) return <span key={i} className="text-red-400">{line.slice(9)}{nl}</span>;
          if (line.startsWith('[error] '))  return <span key={i} className="text-red-400">{line}{nl}</span>;
          if (line === '[interrupted]')     return <span key={i} className="text-yellow-400">{line}{nl}</span>;
          return <span key={i} className="text-gray-200">{line}{nl}</span>;
        })}
        {streaming && <span className="text-amber-400 animate-pulse">▌</span>}
      </pre>
      {!streaming && resolvedExitCode != null && (
        <div className={`mt-1.5 inline-flex items-center gap-1 text-[10px] font-mono px-1.5 py-0.5 rounded ${resolvedExitCode === 0 ? 'bg-green-900/60 text-green-300' : 'bg-red-900/60 text-red-300'}`}>
          {resolvedExitCode === 0 ? '✓' : '✗'} exit {resolvedExitCode}
        </div>
      )}
    </div>
  );
}

/**
 * 以 document.execCommand('copy') 複製純文字（相容非安全上下文，不使用 navigator.clipboard）。
 */
function copyTextExecCommand(text) {
  const t = text == null ? '' : String(text);
  if (!t) return false;
  let ta;
  try {
    ta = document.createElement('textarea');
    ta.value = t;
    ta.setAttribute('readonly', '');
    ta.style.position = 'fixed';
    ta.style.left = '-9999px';
    ta.style.top = '0';
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    return document.execCommand('copy');
  } catch (e) {
    return false;
  } finally {
    if (ta && ta.parentNode) ta.parentNode.removeChild(ta);
  }
}

/** 訊息氣泡用複製按鈕（複製 m.content 原始文字） */

      aria-label={copied ? '已複製到剪貼簿' : '複製訊息'}

  );
}

/** 將 assistant 訊息轉發到其他會話（Modal） */
function ForwardModal({
  payload,
  onClose,
  currentSessionId,
  onForwarded,
  allSessions,
  usePermModeDropdown = false,
}) {
  const allSessionsRef = useRef(allSessions);
  useEffect(() => { allSessionsRef.current = allSessions; }, [allSessions]);
  const [sessionsList, setSessionsList] = useState([]);
  const [loadingSessions, setLoadingSessions] = useState(false);
  const [selectedId, setSelectedId] = useState(null);
  const [copyFromId, setCopyFromId] = useState('');
  const [note, setNote] = useState('');
  const [newName, setNewName] = useState('');
  const [newWorkDir, setNewWorkDir] = useState('');
  const [newAgent, setNewAgent] = useState('claude');
  const [newMode, setNewMode] = useState('default');
  const [newCliExtra, setNewCliExtra] = useState('');
  const [forwardModel, setForwardModel] = useState('');
  const [busy, setBusy] = useState(false);
  const [errText, setErrText] = useState('');

  useEffect(() => {
    if (!payload) return;
    const prev = document.body.style.overflow;
    document.body.style.overflow = 'hidden';
    return () => { document.body.style.overflow = prev; };
  }, [payload]);

  useEffect(() => {
    if (!payload) return;
    setNote('');
    setErrText('');
    setBusy(false);
    setSessionsList([]);
    setSelectedId(null);
    setCopyFromId('');
    setNewName(
      `轉發·${new Date().toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit', second: '2-digit' })}`,
    );
    setNewWorkDir('');
    setNewAgent('claude');
    setNewMode('default');
    setNewCliExtra('');
    setForwardModel('');
    const inherited = allSessionsRef.current;
    if (Array.isArray(inherited) && inherited.length > 0) {
      setSessionsList(inherited);
      const targets = inherited.filter((s) => s.id !== currentSessionId);
      setSelectedId(targets[0]?.id ?? 'new');
      setCopyFromId(inherited[0]?.id ?? '');
    } else {
      (async () => {
        setLoadingSessions(true);
        try {
          const res = await apiFetch('/sessions');
          if (!res.ok) throw new Error('無法載入會話列表');
          const data = await res.json();
          const list = Array.isArray(data) ? data : [];
          const sorted = sortSessionsByWorkDirThenName(list);
          setSessionsList(sorted);
          const targets = sorted.filter((s) => s.id !== currentSessionId);
          setSelectedId(targets[0]?.id ?? 'new');
          setCopyFromId(sorted[0]?.id ?? '');
        } catch (e) {
          setErrText(e.message || String(e));
        } finally {
          setLoadingSessions(false);
        }
      })();
    }
  }, [payload, currentSessionId]);

  useEffect(() => {
    if (!copyFromId || !sessionsList.length) return;
    const s = sessionsList.find((x) => x.id === copyFromId);
    if (!s) return;
    const agent = s.agent_type || 'claude';
    setNewAgent(agent);
    setNewWorkDir(s.work_dir || '');
    setNewMode(normalizePermMode(agent, s.permission_mode || 'default'));
    const parts = Array.isArray(s.cli_extra_args) ? s.cli_extra_args : [];
    setForwardModel(extractModelFromCliArgs(parts));
    setNewCliExtra(cliArgsWithoutModel(parts).join('\n'));
  }, [copyFromId, sessionsList]);

  useEffect(() => {
    if (!payload) return;
    const h = (e) => {
      if (e.key === 'Escape') onClose();
    };
    window.addEventListener('keydown', h);
    return () => window.removeEventListener('keydown', h);
  }, [payload, onClose]);

  if (!payload) return null;

  const targets = sessionsList.filter((s) => s.id !== currentSessionId);
  const messageContent = String(payload.messageContent || '');

  const runForward = async () => {
    const composed = buildForwardUserPrompt(note, messageContent);
    if (!String(composed || '').trim()) {
      setErrText('沒有可轉發的內容');
      return;
    }
    setBusy(true);
    setErrText('');
    try {
      if (selectedId !== 'new') {
        if (!selectedId) throw new Error('請選擇目標會話');
        await sendPromptViaEphemeralWS(selectedId, composed);
        const target = sessionsList.find((s) => s.id === selectedId);
        if (!target) throw new Error('找不到目標會話');
        onForwarded({ messageKey: payload.messageKey, targetSession: target, jump: false });
        onClose();
        return;
      }
      if (!newName.trim()) {
        setErrText('請填寫新會話名稱');
        return;
      }
      const cliMerged = mergeModelIntoCliExtraLines(newCliExtra, forwardModel);
      const res = await apiFetch('/sessions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          name: newName.trim(),
          work_dir: newWorkDir.trim(),
          permission_mode: newMode,
          agent_type: newAgent,
          cli_extra_args: parseCliExtraArgs(cliMerged),
          input_mode: 'agent',
        }),
      });
      if (!res.ok) {
        const j = await res.json().catch(() => ({}));
        throw new Error(j.error || `建立失敗 (${res.status})`);
      }
      const created = await res.json();
      await sendPromptViaEphemeralWS(created.id, composed);
      onForwarded({ messageKey: payload.messageKey, targetSession: created, jump: true });
      onClose();
    } catch (e) {
      setErrText(e.message || String(e));
    } finally {
      setBusy(false);
    }
  };

  return (
    <div
      className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/60 backdrop-blur-[2px]"
      onClick={onClose}
      role="presentation"
    >
      <div
        className="max-w-md sm:max-w-xl md:max-w-2xl w-full max-h-[min(90vh,32rem)] md:max-h-[min(92vh,48rem)] overflow-y-auto app-scroll rounded-2xl border border-slate-700 bg-slate-950/95 shadow-2xl shadow-black/50 p-4 md:p-6 space-y-3 md:space-y-4"
        onClick={(e) => e.stopPropagation()}
        role="dialog"
        aria-modal="true"
        aria-labelledby="forward-modal-title"
      >
        <div id="forward-modal-title" className="text-sm md:text-base font-semibold text-slate-100">
          Forward 到其他會話
        </div>
        {loadingSessions ? (
          <div className="text-xs text-slate-500 py-4 text-center">載入會話…</div>
        ) : (
          <>
            <div className="space-y-1.5">
              <div className="text-[10px] uppercase tracking-wide text-slate-500">目標會話</div>
              <div className="space-y-1 max-h-40 md:max-h-56 overflow-y-auto app-scroll pr-0.5">
                {targets.map((s) => {
                  const active = selectedId === s.id;
                  const shortDir = workDirGroupShortLabel(s.work_dir);
                  return (
                    <button
                      key={s.id}
                      type="button"
                      onClick={() => setSelectedId(s.id)}
                      className={`w-full flex items-center gap-2 rounded-lg border px-2.5 py-2 text-left text-sm transition-colors ${
                        active
                          ? 'border-cyan-400/50 bg-cyan-500/10 ring-2 ring-cyan-400/35'
                          : 'border-slate-700/80 bg-slate-900/40 hover:bg-slate-800/50'
                      }`}
                    >
                      <span
                        className={`inline-flex items-center gap-0.5 shrink-0 text-[10px] px-1.5 py-0.5 rounded-full font-mono uppercase ${getAgentBadgeClass(s.agent_type)}`}
                      >

                      <span className="min-w-0 flex-1 truncate font-mono text-xs text-slate-300" title={s.work_dir || ''}>

                      rows={3}
                      spellCheck={false}
                      className="w-full bg-slate-900/80 border border-slate-600 rounded-lg px-2 py-2 text-xs text-slate-100 font-mono placeholder-slate-600 app-scroll"
                    />
                  </div>
                )}
                <div className="space-y-1">
                  <label className="text-[10px] text-slate-500">新會話名稱（必填）</label>
                  <input
                    value={newName}
                    onChange={(e) => setNewName(e.target.value)}
                    className="w-full bg-slate-900/80 border border-slate-600 rounded-lg px-2 py-2 text-xs text-slate-100"
                  />
                </div>
              </div>
            )}

            <div className="space-y-1">
              <label className="text-[10px] text-slate-500">備註（可選）</label>
              <textarea
                value={note}
                onChange={(e) => setNote(e.target.value)}
                rows={3}
                placeholder="加上備註給目標會話（可選）"
                className="w-full bg-slate-900/70 border border-slate-600 rounded-lg px-2 py-2 text-sm text-slate-100 placeholder-slate-500 focus:outline-none focus:border-cyan-500/45"
              />
            </div>

            {errText ? <div className="text-xs text-red-400">{errText}</div> : null}

            <div className="flex flex-wrap gap-2 justify-end pt-1">
              <button
                type="button"
                onClick={onClose}
                disabled={busy}
                className="px-3 py-2 rounded-xl text-xs font-medium bg-slate-800 hover:bg-slate-700 text-slate-300 border border-slate-600 disabled:opacity-40"
              >
                取消
              </button>
              <button
                type="button"
                onClick={runForward}
                disabled={busy || loadingSessions}
                className="px-4 py-2 rounded-xl text-xs font-semibold bg-gradient-to-r from-cyan-500 to-teal-600 text-slate-950 hover:brightness-110 disabled:opacity-40"
              >
                {busy ? '送出中…' : 'Forward'}
              </button>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

// ── Session 列表畫面 ──────────────────────────────────────────────────────────
function SessionView({ onEnter, onSessionsLoaded, onSortedSessionsChange, usePermModeDropdown = false, activeSessionId = null }) {
  const [sessions, setSessions]   = useState([]);
  const [sessionSearch, setSessionSearch] = useState('');
  const [sessionSort, setSessionSort]     = useState('last_active_desc');
  const [groupByDir] = useState(true); // RemoteAgent：固定依工作目錄分組
  const [collapsedDirs, setCollapsedDirs] = useState(() => new Set());
  const [showForm, setShowForm]   = useState(false);
  const [newName, setNewName]     = useState('');
  const [newDir, setNewDir]       = useState('');
  const [newMode, setNewMode]     = useState('default');
  const [newAgent, setNewAgent]   = useState('claude');
  const [newCliExtra, setNewCliExtra] = useState('');
  const [newModel, setNewModel] = useState('');
  const [loading, setLoading]     = useState(false);
  const [renamingId, setRenamingId] = useState(null);
  const [renameVal, setRenameVal]   = useState('');
  const renameInputRef = useRef(null);

  const load = async () => {
    try {
      const res = await apiFetch('/sessions');
      if (!res.ok) {
        console.warn('[sessions] load failed', res.status);
        return;
      }
      const data = await res.json();
      if (Array.isArray(data)) {
        const sorted = sortSessionsByWorkDirThenName(data);
        setSessions(sorted);
        onSessionsLoaded?.(sorted);
      } else {
        console.warn('[sessions] unexpected payload', data);
      }
    } catch (err) {
      console.warn('[sessions] load error', err);
    }
  };

  useEffect(() => { load(); }, []);

  useEffect(() => {
    const id = setInterval(() => { load(); }, 5000);
    return () => clearInterval(id);
  }, []);

  useEffect(() => {
    if (renamingId) renameInputRef.current?.focus();
  }, [renamingId]);

  const create = async () => {
    if (!newName.trim()) return;
    setLoading(true);
    const cliMerged = mergeModelIntoCliExtraLines(newCliExtra, newModel);
    const res = await apiFetch('/sessions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        name: newName.trim(),
        work_dir: newDir.trim(),
        permission_mode: newMode,
        agent_type: newAgent,
        cli_extra_args: parseCliExtraArgs(cliMerged),
      }),
    });
    setLoading(false);
    if (!res.ok) return;
    setNewName(''); setNewDir(''); setNewMode('default'); setNewAgent('claude'); setNewCliExtra(''); setNewModel('');
    setShowForm(false);
    load();
  };

  const del = async (id, e) => {
    e.stopPropagation();
    if (!confirm('確定刪除此 Session 及所有對話紀錄？')) return;
    await apiFetch(`/sessions/${id}`, { method: 'DELETE' });
    load();
  };

  const startRename = (s, e) => {
    e.stopPropagation();
    setRenamingId(s.id);
    setRenameVal(s.name || '');
  };

  const commitRename = async (id) => {
    const trimmed = renameVal.trim();
    if (trimmed) {
      await apiFetch(`/sessions/${id}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: trimmed }),
      });
      await load();
    }
    setRenamingId(null);
    setRenameVal('');
  };

  const handleRenameKey = (e, id) => {
    if (e.key === 'Enter') { e.preventDefault(); commitRename(id); }
    if (e.key === 'Escape') { setRenamingId(null); setRenameVal(''); }
  };

  const sortOptions = [
    { value: 'last_active_desc', label: '活動 新→舊' },
    { value: 'last_active_asc', label: '活動 舊→新' },
    { value: 'name_asc', label: '名稱 A→Z' },
    { value: 'name_desc', label: '名稱 Z→A' },
    { value: 'agent_asc', label: 'Runner' },
  ];

  const displaySessions = useMemo(() => {
    const q = sessionSearch.trim().toLowerCase();
    let list = Array.isArray(sessions) ? sessions : [];
    if (q) {
      list = list.filter((s) => {
        const parts = [
          s.name,
          s.work_dir,
          s.git_branch,
          s.description,
          s.agent_type,
          s.agent_session_id,
          s.id,
          ...(Array.isArray(s.cli_extra_args) ? s.cli_extra_args : []),
        ]
          .filter(Boolean)
          .join(' ')
          .toLowerCase();
        return parts.includes(q);
      });
    }
    const out = [...list];
    const cmpName = (a, b) => (a.name || '').localeCompare(b.name || '', 'zh-Hant');
    const cmpAgent = (a, b) => (a.agent_type || '').localeCompare(b.agent_type || '');
    if (sessionSort === 'last_active_asc' || sessionSort === 'last_active_desc') {
      const groupMaxMs = new Map();
      for (const s of out) {
        const k = String(s.work_dir != null ? String(s.work_dir).trim() : '').toLowerCase();
        const t = sessionLastActiveMs(s);
        if (!groupMaxMs.has(k) || t > groupMaxMs.get(k)) groupMaxMs.set(k, t);
      }
      const sign = sessionSort === 'last_active_desc' ? 1 : -1;
      out.sort((a, b) => {
        const ka = String(a.work_dir != null ? String(a.work_dir).trim() : '').toLowerCase();
        const kb = String(b.work_dir != null ? String(b.work_dir).trim() : '').toLowerCase();
        const gd = sign * ((groupMaxMs.get(kb) ?? 0) - (groupMaxMs.get(ka) ?? 0));
        if (gd !== 0) return gd;
        return sign * (sessionLastActiveMs(b) - sessionLastActiveMs(a));
      });
    } else {
      out.sort((a, b) => {
        const wd = cmpSessionWorkDir(a, b);
        if (wd !== 0) return wd;
        switch (sessionSort) {
          case 'name_asc':  return cmpName(a, b);
          case 'name_desc': return cmpName(b, a);
          case 'agent_asc': return cmpAgent(a, b) || cmpName(a, b);
          default: return 0;
        }
      });
    }
    return out;
  }, [sessions, sessionSearch, sessionSort]);

  const sortedSessionsForForward = useMemo(() => {
    const out = [...(Array.isArray(sessions) ? sessions : [])];
    const cmpName = (a, b) => (a.name || '').localeCompare(b.name || '', 'zh-Hant');
    const cmpAgent = (a, b) => (a.agent_type || '').localeCompare(b.agent_type || '');
    if (sessionSort === 'last_active_asc' || sessionSort === 'last_active_desc') {
      const groupMaxMs = new Map();
      for (const s of out) {
        const k = String(s.work_dir != null ? String(s.work_dir).trim() : '').toLowerCase();
        const t = sessionLastActiveMs(s);
        if (!groupMaxMs.has(k) || t > groupMaxMs.get(k)) groupMaxMs.set(k, t);
      }
      const sign = sessionSort === 'last_active_desc' ? 1 : -1;
      out.sort((a, b) => {
        const ka = String(a.work_dir != null ? String(a.work_dir).trim() : '').toLowerCase();
        const kb = String(b.work_dir != null ? String(b.work_dir).trim() : '').toLowerCase();
        const gd = sign * ((groupMaxMs.get(kb) ?? 0) - (groupMaxMs.get(ka) ?? 0));
        if (gd !== 0) return gd;
        return sign * (sessionLastActiveMs(b) - sessionLastActiveMs(a));
      });
    } else {
      out.sort((a, b) => {
        const wd = cmpSessionWorkDir(a, b);
        if (wd !== 0) return wd;
        switch (sessionSort) {
          case 'name_asc':  return cmpName(a, b);
          case 'name_desc': return cmpName(b, a);
          case 'agent_asc': return cmpAgent(a, b) || cmpName(a, b);
          default: return 0;
        }
      });
    }
    return out;
  }, [sessions, sessionSort]);

  useEffect(() => { onSortedSessionsChange?.(sortedSessionsForForward); }, [sortedSessionsForForward]);

  const groupedSessions = useMemo(() => {
    if (!groupByDir) return null;
    const map = new Map();
    const unset = '（未設定工作目錄）';
    for (const s of displaySessions) {
      const raw = s.work_dir != null ? String(s.work_dir).trim() : '';
      const key = raw || unset;
      if (!map.has(key)) map.set(key, []);
      map.get(key).push(s);
    }
    return [...map.entries()].sort((a, b) => {
      const ka = String(a[0]);
      const kb = String(b[0]);
      if (ka === unset && kb !== unset) return 1;
      if (ka !== unset && kb === unset) return -1;
      if (sessionSort === 'last_active_asc' || sessionSort === 'last_active_desc') {
        const maxA = Math.max(0, ...a[1].map(sessionLastActiveMs));
        const maxB = Math.max(0, ...b[1].map(sessionLastActiveMs));
        if (maxA !== maxB) return sessionSort === 'last_active_desc' ? maxB - maxA : maxA - maxB;
      }
      return ka.localeCompare(kb, undefined, { numeric: true, sensitivity: 'base' });
    });
  }, [groupByDir, displaySessions, sessionSort]);

  const sessionSearchActive = sessionSearch.trim().length > 0;

  const toggleDirCollapsed = (dirKey) => {
    setCollapsedDirs((prev) => {
      const next = new Set(prev);
      if (next.has(dirKey)) next.delete(dirKey);
      else next.add(dirKey);
      return next;
    });
  };

  const openNewSessionForDir = (dirKey) => {
    const unset = '（未設定工作目錄）';
    const dir = dirKey === unset ? '' : dirKey;
    setNewDir(dir);
    setNewName(workDirBasename(dirKey));
    setShowForm(true);
  };

  const renderSessionRow = (s, groupIndent) => {
    const active = activeSessionId != null && s.id === activeSessionId;
    const extraArgN = Array.isArray(s.cli_extra_args) ? s.cli_extra_args.length : 0;
    return (
      <div key={s.id} className={groupIndent ? '' : ''}>
        <div
          onClick={() => renamingId !== s.id && onEnter(s)}
          className={'ra-session-card group/card' + (active ? ' active' : '')}
        >
          {renamingId === s.id ? (
            <input
              ref={renameInputRef}
              value={renameVal}
              onChange={(e) => setRenameVal(e.target.value)}
              onKeyDown={(e) => handleRenameKey(e, s.id)}
              onBlur={() => commitRename(s.id)}
              onClick={(e) => e.stopPropagation()}
              className="w-full bg-[oklch(0.19_0.02_264)] border border-violet-500 rounded-lg px-2 py-1 text-sm text-[oklch(0.94_0.01_264)] focus:outline-none"
            />
          ) : (
            <>
              <div className="flex items-center gap-2 min-w-0">
                <span className="flex-1 min-w-0 text-[13.5px] font-semibold text-[oklch(0.92_0.01_264)] truncate leading-snug">
                  {s.name || '未命名'}
                </span>
                {String(s.status || '').toLowerCase() !== 'idle' && String(s.status || '') !== '' ? (
                  <span className={sessionStatusDotClass(s)} title={sessionStatusLabel(s)} />
                ) : null}
                <div className="flex items-center gap-0.5 shrink-0 sm:opacity-0 sm:group-hover/card:opacity-100 transition-opacity">
                  <button
                    type="button"
                    onClick={(e) => startRename(s, e)}
                    aria-label="重新命名"
                    title="重新命名"
                    className="text-[oklch(0.5_0.01_264)] hover:text-violet-400 p-1 rounded transition-colors"
                  >
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="w-3.5 h-3.5" aria-hidden="true">
                      <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
                      <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
                    </svg>
                  </button>
                  <button
                    type="button"
                    onClick={(e) => del(s.id, e)}
                    aria-label="刪除"
                    title="刪除"
                    className="text-[oklch(0.5_0.01_264)] hover:text-red-400 p-1 rounded transition-colors inline-flex items-center justify-center"
                  >
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-3.5 h-3.5" aria-hidden="true">
                      <path d="M3 6h18" />
                      <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
                      <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6" />
                      <path d="M10 11v6" />
                      <path d="M14 11v6" />
                    </svg>
                  </button>
                </div>
              </div>
              <div className="flex flex-wrap items-center gap-1.5 mt-2">
                <span className={`inline-flex items-center gap-1 shrink-0 text-[11px] px-[7px] py-[3px] rounded-md font-semibold ${getAgentBadgeClass(s.agent_type)}`}>
                  <AgentBadgeIcon agentType={s.agent_type} />
                  {AGENT_LABEL[s.agent_type] || s.agent_type || 'claude'}
                </span>
                {s.git_branch ? (
                  <span className="inline-flex items-center text-[11px] px-[7px] py-[3px] rounded-md text-[oklch(0.6_0.01_264)] bg-[oklch(0.24_0.02_264)] truncate max-w-[9rem]" title={s.git_branch}>
                    {s.git_branch}
                  </span>
                ) : null}
                {extraArgN > 0 ? (
                  <span className="inline-flex items-center text-[11px] px-[7px] py-[3px] rounded-md text-[oklch(0.5_0.01_264)] bg-[oklch(0.24_0.02_264)]" title="自訂 CLI 引數">
                    +{extraArgN}
                  </span>
                ) : null}
                {((s.agent_type || 'claude') !== 'codex') && s.permission_mode && s.permission_mode !== 'default' ? (
                  <span className="inline-flex items-center text-[11px] px-[7px] py-[3px] rounded-md text-[oklch(0.6_0.01_264)] bg-[oklch(0.24_0.02_264)]" title="權限模式">
                    {PERM_MODE_LABEL[s.permission_mode] || s.permission_mode}
                  </span>
                ) : null}
              </div>
            </>
          )}
        </div>
      </div>
    );
  };

  return (
    <div className="flex flex-col h-app min-w-0 overflow-hidden">
      {/* Header — 設計 1a / 2a */}
      <div className="flex items-center justify-between px-5 pt-[18px] pb-3 shrink-0"
           style={{ paddingTop: 'calc(18px + env(safe-area-inset-top) + var(--tg-content-safe-top))' }}>
        <div className="flex items-center gap-2 min-w-0">
          <div className="w-6 h-6 rounded-[6px] bg-gradient-to-br from-[oklch(0.62_0.19_275)] to-[oklch(0.6_0.17_300)] flex items-center justify-center shrink-0" aria-hidden>
            <div className="w-[9px] h-[9px] rounded-[2px] bg-white" />
          </div>
          <span className="ra-display text-base text-[oklch(0.94_0.01_264)] tracking-tight">Agent Console</span>
        </div>
        <button
          type="button"
          onClick={() => setShowForm(!showForm)}
          aria-label={showForm ? '關閉建立表單' : '建立新 Session'}
          title={showForm ? '關閉' : '新 Session'}
          className="flex h-[30px] w-[30px] shrink-0 items-center justify-center rounded-[9px] bg-[oklch(0.62_0.19_275)] text-white text-lg leading-none transition hover:brightness-110 active:scale-95 focus:outline-none"
        >
          {showForm ? '×' : '+'}
        </button>
      </div>

      {/* 搜尋／排序 — 設計列 */}
      {sessions.length > 0 && (
        <div className="px-5 pb-3 shrink-0 flex gap-2 min-w-0 items-center">
          <div className="flex-1 min-w-0 flex items-center gap-1.5 bg-[oklch(0.19_0.02_264)] border border-[oklch(0.28_0.02_264)] rounded-[9px] px-2.5 py-2">
            <span className="text-[oklch(0.5_0.01_264)] text-sm shrink-0" aria-hidden>⌕</span>
            <input
              type="search"
              value={sessionSearch}
              onChange={(e) => setSessionSearch(e.target.value)}
              placeholder="搜尋 session…"
              autoComplete="off"
              className="flex-1 min-w-0 bg-transparent border-0 p-0 text-[13px] text-[oklch(0.9_0.01_264)] placeholder-[oklch(0.5_0.01_264)] focus:outline-none"
            />
          </div>
          <select
            id="session-sort"
            value={sessionSort}
            onChange={(e) => setSessionSort(e.target.value)}
            title="排序"
            aria-label="排序"
            className="shrink-0 bg-[oklch(0.19_0.02_264)] border border-[oklch(0.28_0.02_264)] rounded-[9px] px-2.5 py-2 text-xs text-[oklch(0.65_0.01_264)] focus:outline-none cursor-pointer max-w-[6.5rem]"
          >
            {sortOptions.map((opt) => (
              <option key={opt.value} value={opt.value}>{opt.label.replace('活動 ', '')}</option>
            ))}
          </select>
        </div>
      )}

      {/* 建立表單 */}
      {showForm && (
        <div className="px-4 py-3 bg-[oklch(0.15_0.02_264)] border-b border-[oklch(0.28_0.02_264)] space-y-2 shrink-0 min-w-0 ra-card-enter">
          <input value={newName} onChange={e => setNewName(e.target.value)}
            placeholder="Session 名稱（必填）"
            className="w-full min-w-0 bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm text-gray-200 placeholder-gray-500 focus:outline-none focus:border-violet-600" />
          <input value={newDir} onChange={e => setNewDir(e.target.value)}
            placeholder="工作目錄（選填，如 /home/user/project）"
            className="w-full min-w-0 bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm text-gray-200 placeholder-gray-500 focus:outline-none focus:border-violet-600 font-mono" />
          <div className="min-w-0 space-y-2">
            <select
              value={newAgent}
              onChange={(e) => {
                const next = e.target.value;
                setNewAgent(next);
                setNewMode((prev) => normalizePermMode(next, prev));
              }}
              className="w-full min-w-0 bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm text-gray-300"
            >
              <option value="claude">Claude</option>
              <option value="cursor">Cursor</option>
              <option value="kiro">Kiro</option>
              <option value="codex">Codex</option>
            </select>
            <div className="min-w-0">
              {usePermModeDropdown ? (
                <div className="flex items-center gap-2 min-w-0">
                  <span className="shrink-0 text-xs text-gray-500">權限</span>
                  <PermModeSelect
                    agentType={newAgent}
                    value={newMode}
                    onChange={setNewMode}
                    disabled={newAgent === 'codex' || newAgent === 'kiro'}
                    id="session-new-perm-mode"
                    className="flex-1 min-w-0 py-2"
                  />
                </div>
              ) : (
                <>
                  <div className="mb-1 text-[10px] uppercase tracking-wide text-gray-500">權限模式</div>
                  <PermModeSwitch
                    agentType={newAgent}
                    value={newMode}
                    onChange={setNewMode}
                    disabled={newAgent === 'codex' || newAgent === 'kiro'}
                  />
                </>
              )}
            </div>
          </div>
          {newAgent !== 'antigravity' && (
            <div className="min-w-0 space-y-1">
              <div className="text-[10px] uppercase tracking-wide text-gray-500">Model（選填，寫入 --model）</div>
              <input
                value={newModel}
                onChange={(e) => setNewModel(e.target.value)}
                placeholder="例如 sonnet、claude-sonnet-4.6、auto"
                className="w-full min-w-0 bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm text-gray-200 placeholder-gray-500 focus:outline-none focus:border-violet-600 font-mono"
              />
            </div>
          )}
          {newAgent === 'claude' && (
            <div className="min-w-0 space-y-1">
              <div className="text-[10px] uppercase tracking-wide text-gray-500">自訂 CLI 引數（選填）</div>
              <textarea
                value={newCliExtra}
                onChange={(e) => setNewCliExtra(e.target.value)}
                placeholder={'每行一個引數，例如：\n--plugin-dir\n./.claude/plugins/crm\n--plugin-dir\n./.claude/plugins/crm2\n含空格的路徑請寫在同一行。'}
                rows={5}
                spellCheck={false}
                className="w-full min-w-0 bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm text-gray-200 placeholder-gray-500 focus:outline-none focus:border-violet-600 font-mono leading-relaxed overflow-y-auto app-scroll"
              />
            </div>
          )}
          <div className="flex flex-wrap gap-2 justify-end">
            <button onClick={create} disabled={loading || !newName.trim()}
              className="px-4 py-2 bg-violet-600 hover:bg-violet-500 disabled:opacity-40 text-white rounded-lg text-sm font-medium shrink-0">
              建立
            </button>
            <button onClick={() => setShowForm(false)}
              className="px-3 py-2 bg-gray-700 hover:bg-gray-600 text-gray-300 rounded-lg text-sm shrink-0">
              取消
            </button>
          </div>
        </div>
      )}

      {/* Session 列表 */}

      aria-label="Slash 命令"
